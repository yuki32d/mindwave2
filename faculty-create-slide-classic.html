<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="loading-spinner.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Classic Slide – MindWave</title>
    <link rel="stylesheet" href="3d-depth-design.css">
    <script src="auth-guard.js"></script>
    <script>
        if (!checkAdminAuth()) {
            // Will redirect if not authenticated
        }
    </script>
</head>

<body data-theme="dark">
    <div class="app-shell">
        <!-- Header -->
        <header class="topbar">
            <div class="topbar-brand">
                <span>🌊</span>
                <span>MindwaveIo</span>
            </div>
            <div class="topbar-search">
                <span>🔍</span>
                <input type="text" placeholder="Search...">
            </div>
            <div class="topbar-actions">
                <span id="adminNotificationBtn" style="cursor: pointer;" title="Notifications">🔔</span>
                <span id="adminSettingsBtn" style="cursor: pointer;" title="Settings">⚙️</span>
                <div class="profile-toggle" id="profileToggle">
                    <span>👤</span>
                    <small>Account</small>
                </div>
            </div>
        </header>


        <div style="max-width: 1400px; margin: 0 auto; padding: 24px;">
            <!-- Main Content -->
            <main>
                <div class="main-header">
                    <div>
                        <h1>📄 Create Classic Slide</h1>
                        <p>Simple, clean slide with title and content</p>
                    </div>
                    <div class="header-actions">
                        <button class="secondary-btn" onclick="window.history.back()">← Back</button>
                        <button class="primary-btn" id="publishBtn">🚀 Publish Slide</button>
                    </div>
                </div>

                <!-- Slide Configuration -->
                <div class="grid two">
                    <section class="panel">
                        <h2>📝 Slide Content</h2>
                        <form id="slideForm">
                            <div>
                                <label for="slideTitle">Slide Title</label>
                                <input type="text" id="slideTitle" placeholder="e.g., Introduction to AI" required>
                            </div>

                            <div>
                                <label for="slideContent">Content</label>
                                <textarea id="slideContent" rows="8" placeholder="Enter your slide content here..."
                                    required></textarea>
                            </div>

                            <div>
                                <label for="backgroundColor">Background Color</label>
                                <select id="backgroundColor">
                                    <option value="dark">Dark (Default)</option>
                                    <option value="light">Light</option>
                                    <option value="blue">Blue</option>
                                    <option value="green">Green</option>
                                    <option value="purple">Purple</option>
                                </select>
                            </div>

                            <div>
                                <label for="displayDuration">Display Duration (seconds)</label>
                                <input type="number" id="displayDuration" value="30" min="5" max="300">
                            </div>
                        </form>
                    </section>

                    <!-- Live Preview -->
                    <section class="panel">
                        <h2>👁️ Live Preview</h2>
                        <div id="slidePreview"
                            style="aspect-ratio: 16/9; background: #1E2433; border-radius: 16px; padding: 48px; display: flex; flex-direction: column; justify-content: center; box-shadow: 0 8px 32px rgba(0,0,0,0.4);">
                            <h2 id="previewTitle"
                                style="font-size: 36px; font-weight: 700; color: #f5f7ff; margin-bottom: 24px;">Your
                                slide title</h2>
                            <p id="previewContent"
                                style="font-size: 18px; line-height: 1.6; color: #9ea4b6; white-space: pre-wrap;">Your
                                content will appear here</p>
                        </div>
                    </section>
                </div>
            </main>
        </div>
    </div>

    <script src="loading-spinner.js"></script>
    <script src="faculty-create-slide-classic.js"></script>
</body>

</html>
