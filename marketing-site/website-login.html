<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - MindWave</title>
    <meta name="description" content="Log in to your MindWave account.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>

<body class="auth-page">
    <!-- Simple Header -->
    <header class="auth-header">
        <div class="container">
            <a href="website-home.html" class="auth-logo">
                <i class="fas fa-brain"></i>
                <span>Mind<span class="gradient-text">Wave</span></span>
            </a>
            <div class="auth-header-link">
                New to MindWave? <a href="website-signup.html">Create an account</a>
            </div>
        </div>
    </header>

    <!-- Login Form -->
    <main class="auth-main">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-card-header">
                    <h1>Welcome back</h1>
                    <p>Log in to your MindWave account</p>
                </div>

                <!-- Social Login -->
                <div class="social-login">
                    <button class="btn-social btn-google">
                        <i class="fab fa-google"></i>
                        Continue with Google
                    </button>
                    <button class="btn-social btn-microsoft">
                        <i class="fab fa-microsoft"></i>
                        Continue with Microsoft
                    </button>
                </div>

                <div class="divider">
                    <span>or</span>
                </div>

                <!-- Login Form -->
                <form id="loginForm" class="auth-form" novalidate>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="you@company.com" required
                            autocomplete="email" autofocus>
                        <span class="form-error" id="emailError"></span>
                    </div>

                    <div class="form-group">
                        <div class="label-with-link">
                            <label for="password">Password</label>
                            <a href="reset-password.html" class="forgot-password">Forgot password?</a>
                        </div>
                        <div class="password-input-wrapper">
                            <input type="password" id="password" name="password" placeholder="Enter your password"
                                required autocomplete="current-password">
                            <button type="button" class="password-toggle" id="passwordToggle">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <span class="form-error" id="passwordError"></span>
                    </div>

                    <div class="form-group checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="remember" name="remember">
                            <span>Remember me for 30 days</span>
                        </label>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
                        <span class="btn-text">Log In</span>
                        <span class="btn-loader" style="display: none;">
                            <i class="fas fa-spinner fa-spin"></i> Logging in...
                        </span>
                    </button>
                </form>

                <!-- Demo Account -->
                <div class="demo-account">
                    <p>Want to try it first?</p>
                    <button class="btn btn-outline btn-block" id="demoBtn">
                        <i class="fas fa-play-circle"></i> Try Demo Account
                    </button>
                </div>
            </div>

            <!-- Trust Badges -->
            <div class="trust-badges">
                <div class="badge">
                    <i class="fas fa-shield-alt"></i>
                    <span>Secure Login</span>
                </div>
                <div class="badge">
                    <i class="fas fa-lock"></i>
                    <span>Encrypted</span>
                </div>
                <div class="badge">
                    <i class="fas fa-user-shield"></i>
                    <span>Privacy Protected</span>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="auth-footer">
        <div class="container">
            <p>&copy; 2024 MindWave Inc. All rights reserved.</p>
            <div class="footer-links">
                <a href="privacy.html">Privacy</a>
                <a href="terms.html">Terms</a>
                <a href="contact.html">Contact</a>
            </div>
        </div>
    </footer>

    <script src="js/login.js"></script>
</body>

</html>
