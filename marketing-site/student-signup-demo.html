<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account — MindWave</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
:root{--p:#4F46E5;--p2:#7C3AED;--text:#111827;--muted:#6B7280;--border:#E5E7EB;--danger:#EF4444;--success:#10B981;}
body{display:flex;min-height:100vh;}

/* Form panel */
.form-panel{
  width:460px;flex-shrink:0;background:#fff;
  display:flex;flex-direction:column;padding:44px 52px 36px;
  position:relative;z-index:2;box-shadow:4px 0 40px rgba(0,0,0,.06);
  overflow-y:auto;
}

/* Illus panel */
.illus-panel{
  flex:1;position:relative;
  background:linear-gradient(135deg,#EEF2FF 0%,#F5F3FF 50%,#EDE9FE 100%);
  overflow:hidden;display:flex;align-items:center;justify-content:center;
}
.blob{position:absolute;border-radius:50%;filter:blur(70px);pointer-events:none;}
.blob1{width:420px;height:420px;background:rgba(99,102,241,.13);top:-60px;right:-80px;}
.blob2{width:300px;height:300px;background:rgba(139,92,246,.10);bottom:40px;left:20px;}
.college-bg{position:absolute;inset:0;background:url('../background.jpg') center/cover no-repeat;opacity:.08;}
.illus-img{position:relative;z-index:1;width:min(520px,86%);filter:drop-shadow(0 20px 40px rgba(79,70,229,.14));}
.right-brand{position:absolute;top:32px;left:52px;z-index:3;font-size:.82rem;font-weight:700;color:rgba(79,70,229,.5);letter-spacing:.04em;text-transform:uppercase;}

/* Logo */
.logo{display:flex;align-items:center;gap:10px;margin-bottom:36px;}
.logo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--p),var(--p2));display:flex;align-items:center;justify-content:center;color:#fff;font-size:1rem;}
.logo-name{font-size:1.2rem;font-weight:800;color:var(--text);letter-spacing:-.02em;}
.logo-name span{background:linear-gradient(135deg,var(--p),var(--p2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

/* Steps */
.steps{display:flex;gap:6px;margin-bottom:8px;}
.step-dot{width:24px;height:4px;border-radius:100px;background:var(--border);transition:background .3s;}
.step-dot.active{background:var(--p);}
.step-label{font-size:.72rem;color:var(--muted);margin-bottom:24px;}

.form-title{font-size:1.5rem;font-weight:800;color:var(--text);letter-spacing:-.03em;margin-bottom:5px;}
.form-sub{font-size:.87rem;color:var(--muted);margin-bottom:28px;}

/* Name row */
.name-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* field */
.field{margin-bottom:16px;}
.field label{display:block;font-size:.78rem;font-weight:600;color:var(--text);margin-bottom:6px;}
.input-wrap{position:relative;}
.input-wrap .ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:#9CA3AF;font-size:.82rem;pointer-events:none;}
.field input{
  width:100%;padding:12px 13px 12px 36px;
  border:1.5px solid var(--border);border-radius:10px;
  font-size:.9rem;color:var(--text);font-family:'Inter',sans-serif;
  background:#fff;transition:border-color .2s,box-shadow .2s;
}
.field input::placeholder{color:#C4C9D4;}
.field input:focus{outline:none;border-color:var(--p);box-shadow:0 0 0 3px rgba(79,70,229,.1);}
.field input.err-inp{border-color:var(--danger);box-shadow:0 0 0 3px rgba(239,68,68,.08);}
.pw-toggle{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;color:#9CA3AF;cursor:pointer;font-size:.82rem;padding:4px;transition:color .2s;}
.pw-toggle:hover{color:var(--p);}

/* Password strength */
.pw-strength{margin-top:6px;display:flex;gap:4px;}
.pw-bar{flex:1;height:3px;border-radius:100px;background:var(--border);transition:background .3s;}
.pw-label{font-size:.68rem;color:var(--muted);margin-top:4px;}

/* terms */
.terms-row{display:flex;align-items:flex-start;gap:9px;margin:14px 0 18px;font-size:.8rem;color:var(--muted);cursor:pointer;user-select:none;}
.terms-row input{accent-color:var(--p);width:14px;height:14px;margin-top:2px;flex-shrink:0;}
.terms-row a{color:var(--p);font-weight:600;text-decoration:none;}
.terms-row a:hover{text-decoration:underline;}

/* error / success */
.msg{border-radius:8px;padding:10px 13px;font-size:.82rem;margin-bottom:14px;display:none;align-items:center;gap:8px;}
.err-msg{background:#FEF2F2;border:1px solid #FECACA;color:var(--danger);animation:shake .35s ease;}
.suc-msg{background:#F0FDF4;border:1px solid #BBF7D0;color:#059669;}
.msg.show{display:flex;}
@keyframes shake{0%,100%{transform:translateX(0);}20%,60%{transform:translateX(-5px);}40%,80%{transform:translateX(5px);}}

/* btn */
.submit-btn{
  width:100%;padding:13px;border:none;border-radius:10px;
  background:linear-gradient(135deg,var(--p),var(--p2));
  color:#fff;font-size:.93rem;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 4px 20px rgba(79,70,229,.28);transition:all .3s;margin-bottom:18px;
}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(79,70,229,.36);}
.spin{width:17px;height:17px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg);}}
.submit-btn.loading .btn-lbl{display:none;} .submit-btn.loading .spin{display:block;}

.bottom{text-align:center;font-size:.82rem;color:var(--muted);}
.bottom a{color:var(--p);font-weight:600;text-decoration:none;}
.bottom a:hover{text-decoration:underline;}
.bottom-bar{margin-top:auto;padding-top:28px;font-size:.72rem;color:#D1D5DB;text-align:center;}
.bottom-bar a{color:#9CA3AF;text-decoration:none;}
.bottom-bar a:hover{color:var(--p);}

@media(max-width:860px){.illus-panel{display:none;}.form-panel{width:100%;max-width:460px;margin:auto;box-shadow:none;padding:36px 28px;}body{background:#FAFAFA;}}
@media(max-width:460px){.form-panel{padding:28px 18px;}.name-row{grid-template-columns:1fr;}}
</style>
</head>
<body>

<!-- FORM PANEL -->
<div class="form-panel">
  <div class="logo">
    <div class="logo-icon"><i class="fas fa-brain"></i></div>
    <div class="logo-name">Mind<span>Wave</span></div>
  </div>

  <div class="steps">
    <div class="step-dot active"></div>
    <div class="step-dot active"></div>
    <div class="step-dot"></div>
  </div>
  <div class="step-label">Step 1 of 3 — Your details</div>

  <div class="form-title">Create your account</div>
  <div class="form-sub">Use your college email to register</div>

  <form id="signup-form" novalidate>
    <div class="name-row">
      <div class="field">
        <label for="fname">First name</label>
        <div class="input-wrap">
          <i class="fas fa-user ico"></i>
          <input type="text" id="fname" placeholder="Raj" required>
        </div>
      </div>
      <div class="field">
        <label for="lname">Last name</label>
        <div class="input-wrap">
          <i class="fas fa-user ico"></i>
          <input type="text" id="lname" placeholder="Kumar" required>
        </div>
      </div>
    </div>

    <div class="field">
      <label for="email">College email</label>
      <div class="input-wrap">
        <i class="fas fa-envelope ico"></i>
        <input type="email" id="email" placeholder="name.mca25@cmrit.ac.in" autocomplete="email" required>
      </div>
    </div>

    <div class="field">
      <label for="password">Password</label>
      <div class="input-wrap">
        <i class="fas fa-lock ico"></i>
        <input type="password" id="password" placeholder="Create a strong password" autocomplete="new-password" required>
        <button type="button" class="pw-toggle" id="pwToggle"><i class="fas fa-eye" id="eyeIco"></i></button>
      </div>
      <div class="pw-strength" id="pwStr">
        <div class="pw-bar" id="b1"></div>
        <div class="pw-bar" id="b2"></div>
        <div class="pw-bar" id="b3"></div>
        <div class="pw-bar" id="b4"></div>
      </div>
      <div class="pw-label" id="pwLbl"></div>
    </div>

    <label class="terms-row">
      <input type="checkbox" id="terms" required>
      I agree to the <a href="terms.html" target="_blank">Terms of Service</a> and <a href="privacy.html" target="_blank">Privacy Policy</a>
    </label>

    <div class="err-msg msg" id="errMsg"><i class="fas fa-circle-exclamation"></i><span id="errTxt"></span></div>
    <div class="suc-msg msg" id="sucMsg"><i class="fas fa-circle-check"></i><span>Account created! Redirecting to login…</span></div>

    <button type="submit" class="submit-btn" id="submitBtn">
      <span class="btn-lbl"><i class="fas fa-user-plus"></i> Create Account</span>
      <div class="spin"></div>
    </button>

    <div class="bottom">Already have an account? <a href="student-login-demo.html">Sign in</a></div>
  </form>

  <div class="bottom-bar">
    <a href="privacy.html">Privacy</a> &nbsp;·&nbsp; <a href="terms.html">Terms</a> &nbsp;·&nbsp; &copy; 2025 MindWave Inc.
  </div>
</div>

<!-- ILLUS PANEL -->
<div class="illus-panel">
  <div class="college-bg"></div>
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <img src="student-login-illustration.png" alt="MindWave student illustration" class="illus-img">
  <div class="right-brand">MindWave · Student Portal</div>
</div>

<script>
// Password toggle
document.getElementById('pwToggle').addEventListener('click',()=>{
  const pw=document.getElementById('password'),ico=document.getElementById('eyeIco');
  pw.type=pw.type==='password'?'text':'password';
  ico.classList.toggle('fa-eye');ico.classList.toggle('fa-eye-slash');
});

// Password strength
const bars=['b1','b2','b3','b4'];
const colors=['#EF4444','#F97316','#EAB308','#10B981'];
const labels=['Weak','Fair','Good','Strong'];
document.getElementById('password').addEventListener('input',function(){
  const v=this.value,lbl=document.getElementById('pwLbl');
  let score=0;
  if(v.length>=8)score++;if(/[A-Z]/.test(v))score++;
  if(/[0-9]/.test(v))score++;if(/[^a-zA-Z0-9]/.test(v))score++;
  bars.forEach((id,i)=>{
    document.getElementById(id).style.background=i<score?colors[Math.min(score-1,3)]:''});
  lbl.textContent=v.length?labels[Math.min(score-1,3)]||'Weak':'';
  lbl.style.color=colors[Math.min(score-1,3)]||'';
});

// Form submit
document.getElementById('signup-form').addEventListener('submit',async function(e){
  e.preventDefault();
  const fname=document.getElementById('fname').value.trim();
  const lname=document.getElementById('lname').value.trim();
  const email=document.getElementById('email').value.trim();
  const password=document.getElementById('password').value;
  const terms=document.getElementById('terms').checked;
  const err=document.getElementById('errMsg'),errTxt=document.getElementById('errTxt');
  const suc=document.getElementById('sucMsg');
  const btn=document.getElementById('submitBtn');
  err.classList.remove('show');suc.classList.remove('show');

  if(!fname||!lname){errTxt.textContent='Please enter your full name.';err.classList.add('show');return;}
  if(!email.includes('@')){errTxt.textContent='Please enter a valid college email.';err.classList.add('show');return;}
  if(password.length<6){errTxt.textContent='Password must be at least 6 characters.';err.classList.add('show');return;}
  if(!terms){errTxt.textContent='Please accept the Terms of Service to continue.';err.classList.add('show');return;}

  btn.classList.add('loading');
  try{
    const res=await fetch('/api/signup',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name:`${fname} ${lname}`,email,password,role:'student'})
    });
    const data=await res.json();
    if(data.ok){
      suc.classList.add('show');
      setTimeout(()=>window.location.href='student-login-demo.html',2000);
    }else{
      errTxt.textContent=data.message||'Signup failed. Please try again.';
      err.classList.add('show');
      err.style.animation='none';requestAnimationFrame(()=>err.style.animation='');
    }
  }catch(ex){
    errTxt.textContent='Connection error — please try again.';err.classList.add('show');
  }finally{btn.classList.remove('loading');}
});
</script>
</body>
</html>
