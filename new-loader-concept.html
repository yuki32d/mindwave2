<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New MindWave Loader Concept</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0b0b0f;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loader-container {
            text-align: center;
        }

        /* Animated MindWave Logo Loader */
        .mindwave-logo-loader {
            width: 200px;
            height: 200px;
            margin: 0 auto 40px;
            position: relative;
        }

        /* Outer Wave Ring */
        .wave-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: #00d9ff;
            border-right-color: #8b5cf6;
            animation: rotate 3s linear infinite;
        }

        .wave-ring:nth-child(2) {
            width: 80%;
            height: 80%;
            top: 10%;
            left: 10%;
            border-top-color: #8b5cf6;
            border-right-color: #ec4899;
            animation: rotate 2s linear infinite reverse;
        }

        /* Center MW Text with Pulse */
        .mw-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 56px;
            font-weight: 900;
            background: linear-gradient(135deg, #00d9ff 0%, #8b5cf6 50%, #ec4899 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 3s ease infinite, pulse 2s ease-in-out infinite;
            letter-spacing: -2px;
        }

        /* Floating Particles */
        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #00d9ff;
            border-radius: 50%;
            opacity: 0;
            animation: float-particle 4s ease-in-out infinite;
        }

        .particle:nth-child(3) {
            top: 20%;
            left: 20%;
            animation-delay: 0s;
            background: #00d9ff;
        }

        .particle:nth-child(4) {
            top: 20%;
            right: 20%;
            animation-delay: 0.5s;
            background: #8b5cf6;
        }

        .particle:nth-child(5) {
            bottom: 20%;
            left: 20%;
            animation-delay: 1s;
            background: #ec4899;
        }

        .particle:nth-child(6) {
            bottom: 20%;
            right: 20%;
            animation-delay: 1.5s;
            background: #00d9ff;
        }

        .particle:nth-child(7) {
            top: 50%;
            left: 10%;
            animation-delay: 2s;
            background: #8b5cf6;
        }

        .particle:nth-child(8) {
            top: 50%;
            right: 10%;
            animation-delay: 2.5s;
            background: #ec4899;
        }

        /* Loading Text */
        .loading-text {
            font-size: 20px;
            font-weight: 600;
            background: linear-gradient(135deg, #00d9ff 0%, #8b5cf6 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 3s ease infinite;
            margin-bottom: 20px;
        }

        /* Progress Dots */
        .progress-dots {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 20px;
        }

        .progress-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d9ff 0%, #8b5cf6 100%);
            animation: dotPulse 1.5s ease-in-out infinite;
        }

        .progress-dot:nth-child(1) {
            animation-delay: 0s;
        }

        .progress-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .progress-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        /* Animations */
        @keyframes rotate {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes gradientShift {

            0%,
            100% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }
        }

        @keyframes pulse {

            0%,
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }

            50% {
                transform: translate(-50%, -50%) scale(1.1);
                opacity: 0.8;
            }
        }

        @keyframes float-particle {
            0% {
                transform: translateY(0) scale(0);
                opacity: 0;
            }

            50% {
                opacity: 1;
            }

            100% {
                transform: translateY(-30px) scale(1);
                opacity: 0;
            }
        }

        @keyframes dotPulse {

            0%,
            100% {
                transform: scale(0.8);
                opacity: 0.5;
            }

            50% {
                transform: scale(1.2);
                opacity: 1;
            }
        }

        /* Alternative: Liquid Wave Loader */
        .liquid-loader {
            width: 200px;
            height: 200px;
            margin: 0 auto 40px;
            position: relative;
            display: none;
        }

        .liquid-container {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid rgba(0, 217, 255, 0.3);
            overflow: hidden;
            position: relative;
        }

        .liquid-wave {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 200%;
            height: 100%;
            background: linear-gradient(135deg, #00d9ff 0%, #8b5cf6 50%, #ec4899 100%);
            border-radius: 40%;
            animation: wave 4s ease-in-out infinite, fillUp 3s ease-out forwards;
        }

        .liquid-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: 900;
            color: white;
            z-index: 10;
            mix-blend-mode: difference;
        }

        @keyframes wave {

            0%,
            100% {
                transform: translateX(-50%) rotate(0deg);
            }

            50% {
                transform: translateX(-50%) rotate(180deg);
            }
        }

        @keyframes fillUp {
            0% {
                bottom: -100%;
            }

            100% {
                bottom: 0;
            }
        }

        .controls {
            margin-top: 40px;
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #00d9ff 0%, #8b5cf6 100%);
            color: white;
            border: none;
            border-radius: 999px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 217, 255, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body>
    <div class="loader-container">
        <!-- Design 1: Animated MW Logo -->
        <div class="mindwave-logo-loader" id="loader1">
            <div class="wave-ring"></div>
            <div class="wave-ring"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="mw-text">MW</div>
        </div>

        <!-- Design 2: Liquid Wave (Hidden by default) -->
        <div class="liquid-loader" id="loader2">
            <div class="liquid-container">
                <div class="liquid-wave"></div>
                <div class="liquid-text">MW</div>
            </div>
        </div>

        <div class="loading-text">Loading MindWave...</div>

        <div class="progress-dots">
            <div class="progress-dot"></div>
            <div class="progress-dot"></div>
            <div class="progress-dot"></div>
        </div>

        <div class="controls">
            <button class="btn" onclick="switchLoader(1)">Animated MW Logo</button>
            <button class="btn btn-secondary" onclick="switchLoader(2)">Liquid Wave</button>
        </div>
    </div>

    <script>
        function switchLoader(num) {
            const loader1 = document.getElementById('loader1');
            const loader2 = document.getElementById('loader2');

            if (num === 1) {
                loader1.style.display = 'block';
                loader2.style.display = 'none';
            } else {
                loader1.style.display = 'none';
                loader2.style.display = 'block';
            }
        }
    </script>
</body>

</html>
