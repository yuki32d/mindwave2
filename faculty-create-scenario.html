<!DOCTYPE html>
<html lang="en">
<head>
    <script src="admin-theme-init.js"></script>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindWave – Scenario Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="game-builder.css">
</head>
<body>

    <!-- TOPBAR -->
    <header class="gb-topbar">
        <a class="gb-logo" href="admin.html">
            <div class="gb-logo-mark"><i data-lucide="brain-circuit"></i></div>
            <span class="gb-logo-name">MindWave</span>
        </a>
        <div class="gb-breadcrumb">Game Builder / <span>Scenario</span></div>
        <div class="gb-topbar-right">
            <button class="gb-theme-btn" id="themeToggle" title="Toggle theme">
                <span class="icon-sun"><i data-lucide="sun"></i></span>
                <span class="icon-moon"><i data-lucide="moon"></i></span>
            </button>
            <a href="ai-game-builder.html" class="gb-back-btn">
                <i data-lucide="arrow-left"></i> Back to AI Builder
            </a>
        </div>
    </header>

    <!-- MAIN (wide for 2-col layout) -->
    <div class="gb-main-wide">

        <div class="gb-page-head">
            <div class="gb-page-icon"><i data-lucide="drama"></i></div>
            <div>
                <div class="gb-page-title">Scenario Builder</div>
                <div class="gb-page-sub">Create interactive branching storylines where students make decisions and face consequences.</div>
            </div>
        </div>

        <!-- Game Info -->
        <div class="gb-card">
            <div class="gb-card-head"><i data-lucide="info"></i> Game Information</div>
            <div class="gb-card-body">
                <div class="gb-form-row">
                    <div class="gb-form-group">
                        <label for="gameTitle">Game Title</label>
                        <input id="gameTitle" type="text" required placeholder="e.g. Tech Interview Simulation">
                    </div>
                    <div class="gb-form-group">
                        <label for="gameDifficulty">Difficulty</label>
                        <select id="gameDifficulty">
                            <option value="Easy">Easy</option>
                            <option value="Normal" selected>Normal</option>
                            <option value="Hard">Hard</option>
                        </select>
                    </div>
                </div>
                <div class="gb-form-group">
                    <label for="gameDescription">Description</label>
                    <textarea id="gameDescription" rows="3" required
                        placeholder="Describe the scenario and what students will learn..."></textarea>
                </div>
            </div>
        </div>

        <!-- Builder Grid -->
        <div class="gb-builder-grid">
            <!-- Scene List -->
            <div class="gb-card">
                <div class="gb-card-head"><i data-lucide="list"></i> Scenes</div>
                <div class="gb-card-body">
                    <div class="gb-scene-list" id="sceneList">
                        <div class="gb-empty">
                            <div class="gb-empty-icon"><i data-lucide="film"></i></div>
                            <p>No scenes yet. Click "Add Scene" to start!</p>
                        </div>
                    </div>
                    <button class="gb-btn-dashed" id="addSceneBtn" style="margin-top:14px;">
                        <i data-lucide="plus"></i> Add Scene
                    </button>
                </div>
            </div>

            <!-- Scene Editor -->
            <div class="gb-card">
                <div class="gb-card-head"><i data-lucide="pencil"></i> Edit Scene</div>
                <div class="gb-card-body">
                    <div id="sceneEditor">
                        <div class="gb-empty">
                            <div class="gb-empty-icon"><i data-lucide="mouse-pointer-click"></i></div>
                            <p>Select a scene to edit</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="gb-footer" style="margin-top:18px;">
            <span class="gb-footer-meta">Scenario Builder</span>
            <div class="gb-footer-actions">
                <button type="button" class="gb-btn gb-btn-ghost" id="previewBtn">
                    <i data-lucide="eye"></i> Preview
                </button>
                
            </div>
        </div>

    </div>

    <script>
        lucide.createIcons();
        document.getElementById('themeToggle').addEventListener('click', () => {
            const next = (document.documentElement.getAttribute('data-theme') || 'light') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            document.body.setAttribute('data-theme', next);
            localStorage.setItem('mw-theme', next);
        });
    </script>
    <script src="faculty-create-scenario.js"></script>
</body>
</html>
