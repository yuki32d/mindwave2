<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Quiz - MindWave</title>
    <link rel="stylesheet" href="../3d-depth-design.css">
    <link rel="stylesheet" href="marketing-site/css/live-quiz.css">
    <link rel="stylesheet" href="marketing-site/css/student-nav.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <i class="fas fa-brain"></i>
                <span>MindWave</span>
            </div>
            <div class="nav-actions">
                <a href="student-community.html" class="nav-btn primary-nav-btn"><i class="fas fa-plus"></i> Create
                    Post</a>
                <a href="student-community.html" class="nav-btn"><i class="fas fa-file-alt"></i> My Posts</a>
                <a href="student-poll-response.html" class="nav-btn"><i class="fas fa-poll"></i> Quick Poll</a>
                <a href="student-feedback.html" class="nav-btn"><i class="fas fa-comments"></i> Feedback</a>
                <a href="student-live-quiz.html" class="nav-btn active"><i class="fas fa-trophy"></i> Live Quiz</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="quiz-play-container">
        <!-- Waiting Room -->
        <section class="waiting-room" id="waitingRoom">
            <div class="waiting-card">
                <div class="quiz-icon">
                    <i class="fas fa-trophy"></i>
                </div>
                <h1>Get Ready!</h1>
                <p>Waiting for your teacher to start the quiz...</p>
                <div class="pulse-indicator">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </section>

        <!-- Quiz Play -->
        <section class="quiz-play" id="quizPlay" style="display: none;">
            <!-- Question Header -->
            <div class="question-header">
                <div class="question-info">
                    <span class="question-number" id="questionNumber">Question 1 of 5</span>
                    <span class="your-score">Score: <span id="currentScore">0</span></span>
                </div>
                <div class="timer-container">
                    <div class="timer-circle" id="timerCircle">
                        <span id="timeRemaining">15</span>
                    </div>
                </div>
            </div>

            <!-- Question Display -->
            <div class="question-display">
                <h2 id="questionText">What is 2 + '2' in JavaScript?</h2>
            </div>

            <!-- Answer Grid -->
            <div class="answer-grid" id="answerGrid">
                <button class="answer-btn red" data-index="0">
                    <div class="answer-letter">A</div>
                    <div class="answer-text" id="answerA">22</div>
                </button>
                <button class="answer-btn blue" data-index="1">
                    <div class="answer-letter">B</div>
                    <div class="answer-text" id="answerB">4</div>
                </button>
                <button class="answer-btn yellow" data-index="2">
                    <div class="answer-letter">C</div>
                    <div class="answer-text" id="answerC">Error</div>
                </button>
                <button class="answer-btn green" data-index="3">
                    <div class="answer-letter">D</div>
                    <div class="answer-text" id="answerD">undefined</div>
                </button>
            </div>

            <!-- Feedback Message -->
            <div class="answer-feedback" id="answerFeedback" style="display: none;">
                <div class="feedback-icon" id="feedbackIcon"></div>
                <div class="feedback-text" id="feedbackText"></div>
                <div class="points-earned" id="pointsEarned"></div>
            </div>
        </section>

        <!-- Results Screen -->
        <section class="quiz-results" id="quizResults" style="display: none;">
            <div class="results-card">
                <div class="trophy-icon">
                    <i class="fas fa-trophy"></i>
                </div>
                <h1>Quiz Complete!</h1>
                <div class="final-score">
                    <div class="score-label">Your Score</div>
                    <div class="score-value" id="finalScore">0</div>
                    <div class="score-details">
                        <span id="correctAnswers">0</span> correct out of <span id="totalQuestions">0</span>
                    </div>
                </div>

                <!-- Personal Leaderboard Position -->
                <div class="rank-display">
                    <div class="rank-label">Your Rank</div>
                    <div class="rank-value" id="yourRank">#1</div>
                </div>

                <!-- Top 5 Leaderboard -->
                <div class="mini-leaderboard">
                    <h3><i class="fas fa-medal"></i> Top 5</h3>
                    <div id="topFive" class="top-five-list">
                        <!-- Top 5 entries -->
                    </div>
                </div>

                <button class="btn-primary" onclick="window.location.href='homepage.html'">
                    <i class="fas fa-home"></i> Back to Home
                </button>
            </div>
        </section>
    </main>

    <script src="marketing-site/js/student-quiz.js"></script>
</body>

</html>
