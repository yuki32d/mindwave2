<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Meeting - Student | MindWave</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Agora Web SDK -->
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            color: white;
        }

        .meeting-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .meeting-info h2 {
            margin: 0;
            font-size: 20px;
        }

        .meeting-code {
            color: #00d4ff;
            font-size: 18px;
        }

        .meeting-container {
            width: 100%;
            height: 100vh;
            background: #000;
            position: relative;
            padding-top: 70px;
        }

        .local-video {
            position: absolute;
            top: 90px;
            right: 20px;
            width: 200px;
            height: 150px;
            border-radius: 12px;
            overflow: hidden;
            z-index: 10;
            background: #1a1a1a;
            border: 2px solid #00d4ff;
        }

        .remote-videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 15px;
            padding: 20px;
            height: calc(100vh - 200px);
            overflow-y: auto;
        }

        .remote-video {
            border-radius: 12px;
            overflow: hidden;
            background: #1a1a1a;
            position: relative;
            min-height: 280px;
            border: 1px solid #333;
        }

        .participant-name {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
        }

        .faculty-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            margin-left: 8px;
            font-weight: 600;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 100;
            background: rgba(30, 30, 30, 0.95);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 50px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .control-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .control-btn.active {
            background: #00d4ff;
            color: #000;
        }

        .control-btn.danger {
            background: #ff4444;
        }

        .control-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .control-separator {
            width: 1px;
            height: 48px;
            background: rgba(255, 255, 255, 0.2);
            margin: 0 4px;
        }

        .control-tooltip {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .control-btn:hover .control-tooltip {
            opacity: 1;
        }

        .reactions-menu {
            position: fixed;
            bottom: 100px;
            right: 50%;
            transform: translateX(50%);
            background: rgba(30, 30, 30, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 12px 16px;
            display: none;
            gap: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            z-index: 200;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .reactions-menu.show {
            display: flex;
        }

        .reaction-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: transparent;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .reaction-btn:hover {
            transform: scale(1.3);
        }

        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #00d4ff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="meeting-header">
        <div class="meeting-info">
            <h2>Live Meeting</h2>
            <div class="meeting-code">Meeting Code: <span id="meetingCodeDisplay"></span></div>
        </div>
    </div>

    <div class="loading" id="loadingScreen">
        <div class="spinner"></div>
        <p>Joining meeting...</p>
    </div>

    <div class="meeting-container" id="meetingContainer" style="display: none;">
        <div class="local-video" id="localVideo"></div>
        <div class="remote-videos-grid" id="remoteVideos"></div>

        <div class="controls">
            <!-- Mute/Unmute -->
            <button class="control-btn" id="muteBtn">
                <svg viewBox="0 0 24 24">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z" />
                    <path
                        d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z" />
                </svg>
                <span class="control-tooltip">Mute</span>
            </button>

            <!-- Video On/Off -->
            <button class="control-btn" id="videoBtn">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z" />
                </svg>
                <span class="control-tooltip">Stop Video</span>
            </button>

            <div class="control-separator"></div>

            <!-- Raise Hand -->
            <button class="control-btn" id="raiseHandBtn">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M23 5.5V20c0 2.2-1.8 4-4 4h-7.3c-1.08 0-2.1-.43-2.85-1.19L1 14.83s1.26-1.23 1.3-1.25c.22-.19.49-.29.79-.29.22 0 .42.06.6.16.04.01 4.31 2.46 4.31 2.46V4c0-.83.67-1.5 1.5-1.5S11 3.17 11 4v7h1V1.5c0-.83.67-1.5 1.5-1.5S15 .67 15 1.5V11h1V2.5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5V11h1V5.5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5z" />
                </svg>
                <span class="control-tooltip">Raise Hand</span>
            </button>

            <!-- Reactions -->
            <button class="control-btn" id="reactionsBtn">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z" />
                </svg>
                <span class="control-tooltip">Reactions</span>
            </button>

            <div class="control-separator"></div>

            <!-- Chat -->
            <button class="control-btn" id="chatBtn">
                <svg viewBox="0 0 24 24">
                    <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z" />
                </svg>
                <span class="control-tooltip">Chat</span>
            </button>

            <!-- Participants -->
            <button class="control-btn" id="participantsBtn">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z" />
                </svg>
                <span class="control-tooltip">Participants</span>
            </button>

            <!-- Settings -->
            <button class="control-btn" id="settingsBtn">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94L14.4 2.81c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z" />
                </svg>
                <span class="control-tooltip">Settings</span>
            </button>

            <div class="control-separator"></div>

            <!-- Leave Meeting -->
            <button class="control-btn danger" id="leaveBtn">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11H7v-2h10v2z" />
                </svg>
                <span class="control-tooltip">Leave Meeting</span>
            </button>
        </div>

        <!-- Reactions Menu -->
        <div class="reactions-menu" id="reactionsMenu">
            <button class="reaction-btn" data-reaction="👍">👍</button>
            <button class="reaction-btn" data-reaction="❤️">❤️</button>
            <button class="reaction-btn" data-reaction="😂">😂</button>
            <button class="reaction-btn" data-reaction="👏">👏</button>
            <button class="reaction-btn" data-reaction="🤔">🤔</button>
        </div>
    </div>

    <script>
        // Get meeting code from URL
        const urlParams = new URLSearchParams(window.location.search);
        const meetingCode = urlParams.get('code');

        if (!meetingCode) {
            alert('No meeting code provided');
            window.location.href = 'student-community.html';
        }

        // Authentication
        const token = localStorage.getItem('token');
        const userName = localStorage.getItem('userName') || 'Student';
        const userEmail = localStorage.getItem('userEmail') || '';

        if (!token) {
            window.location.href = 'student-login.html';
        }

        // Agora client and tracks
        let agoraClient = null;
        let localAudioTrack = null;
        let localVideoTrack = null;
        let remoteUsers = {};
        let isMuted = false;
        let isVideoOff = false;

        // Initialize and join meeting
        async function init() {
            const API_BASE = window.location.hostname === 'localhost'
                ? 'http://localhost:8081'
                : 'https://mindwave2.onrender.com';

            try {
                // Display meeting code
                document.getElementById('meetingCodeDisplay').textContent = meetingCode;

                // Call backend to get Agora credentials
                const response = await fetch(`${API_BASE}/api/meetings/${meetingCode}/join-agora`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        studentName: userName,
                        studentEmail: userEmail
                    })
                });

                const data = await response.json();

                if (data.success) {
                    console.log('✅ Agora credentials received:', data);

                    // Initialize Agora client
                    agoraClient = AgoraRTC.createClient({ mode: 'rtc', codec: 'vp8' });

                    // Set up event listeners
                    agoraClient.on('user-published', handleUserPublished);
                    agoraClient.on('user-unpublished', handleUserUnpublished);
                    agoraClient.on('user-left', handleUserLeft);

                    // Join channel
                    await agoraClient.join(
                        data.appId,
                        data.channelName,
                        data.token,
                        data.uid
                    );

                    console.log('✅ Joined Agora channel as AUDIENCE');

                    // Create local tracks
                    localAudioTrack = await AgoraRTC.createMicrophoneAudioTrack();
                    localVideoTrack = await AgoraRTC.createCameraVideoTrack();

                    // Play local video
                    localVideoTrack.play('localVideo');

                    // Publish tracks (students can also publish in this setup)
                    await agoraClient.publish([localAudioTrack, localVideoTrack]);

                    console.log('✅ Published local tracks');

                    // Hide loading, show meeting
                    document.getElementById('loadingScreen').style.display = 'none';
                    document.getElementById('meetingContainer').style.display = 'block';

                } else {
                    console.error('Failed to join Agora meeting:', data.error);
                    alert('Failed to join meeting. Please check the meeting code.');
                    window.location.href = 'student-community.html';
                }
            } catch (error) {
                console.error('Error joining Agora meeting:', error);
                alert('Failed to join meeting. Please try again.');
                window.location.href = 'student-community.html';
            }
        }

        // Handle remote user published
        async function handleUserPublished(user, mediaType) {
            console.log('👤 User published:', user.uid, mediaType);

            await agoraClient.subscribe(user, mediaType);

            if (mediaType === 'video') {
                const remoteVideoTrack = user.videoTrack;

                // Create container for remote video
                let playerContainer = document.getElementById(`player-${user.uid}`);
                if (!playerContainer) {
                    playerContainer = document.createElement('div');
                    playerContainer.id = `player-${user.uid}`;
                    playerContainer.className = 'remote-video';

                    const nameTag = document.createElement('div');
                    nameTag.className = 'participant-name';
                    // First user is likely faculty
                    const isFaculty = Object.keys(remoteUsers).length === 0;
                    nameTag.innerHTML = isFaculty
                        ? `Faculty <span class="faculty-badge">HOST</span>`
                        : `Student ${user.uid}`;
                    playerContainer.appendChild(nameTag);

                    document.getElementById('remoteVideos').appendChild(playerContainer);
                }

                remoteVideoTrack.play(playerContainer);
                remoteUsers[user.uid] = user;
            }

            if (mediaType === 'audio') {
                const remoteAudioTrack = user.audioTrack;
                remoteAudioTrack.play();
            }
        }

        // Handle remote user unpublished
        function handleUserUnpublished(user, mediaType) {
            console.log('👤 User unpublished:', user.uid, mediaType);

            if (mediaType === 'video') {
                const playerContainer = document.getElementById(`player-${user.uid}`);
                if (playerContainer) {
                    playerContainer.remove();
                }
            }
        }

        // Handle user left
        function handleUserLeft(user) {
            console.log('👤 User left:', user.uid);

            const playerContainer = document.getElementById(`player-${user.uid}`);
            if (playerContainer) {
                playerContainer.remove();
            }

            delete remoteUsers[user.uid];
        }

        // Toggle mute
        async function toggleMute() {
            if (!localAudioTrack) return;

            isMuted = !isMuted;
            await localAudioTrack.setEnabled(!isMuted);

            const muteBtn = document.getElementById('muteBtn');
            const muteText = document.getElementById('muteText');

            if (isMuted) {
                muteBtn.classList.add('active');
                muteText.textContent = 'Unmute';
            } else {
                muteBtn.classList.remove('active');
                muteText.textContent = 'Mute';
            }
        }

        // Toggle video
        async function toggleVideo() {
            if (!localVideoTrack) return;

            isVideoOff = !isVideoOff;
            await localVideoTrack.setEnabled(!isVideoOff);

            const videoBtn = document.getElementById('videoBtn');
            const videoText = document.getElementById('videoText');

            if (isVideoOff) {
                videoBtn.classList.add('active');
                videoText.textContent = 'Start Video';
            } else {
                videoBtn.classList.remove('active');
                videoText.textContent = 'Stop Video';
            }
        }

        // Leave meeting
        async function leaveMeeting() {
            try {
                // Close local tracks
                if (localAudioTrack) {
                    localAudioTrack.close();
                }
                if (localVideoTrack) {
                    localVideoTrack.close();
                }

                // Leave channel
                if (agoraClient) {
                    await agoraClient.leave();
                }

                console.log('✅ Left meeting');
                window.location.href = 'student-community.html';
            } catch (error) {
                console.error('Error leaving meeting:', error);
                window.location.href = 'student-community.html';
            }
        }

        // Initialize on page load
        window.addEventListener('load', init);

        // Add event listeners for controls
        document.getElementById('muteBtn').addEventListener('click', toggleMute);
        document.getElementById('videoBtn').addEventListener('click', toggleVideo);
        document.getElementById('leaveBtn').addEventListener('click', leaveMeeting);
        document.getElementById('raiseHandBtn').addEventListener('click', toggleRaiseHand);
        document.getElementById('reactionsBtn').addEventListener('click', toggleReactions);
        document.getElementById('chatBtn').addEventListener('click', toggleChat);
        document.getElementById('participantsBtn').addEventListener('click', showParticipants);
        document.getElementById('settingsBtn').addEventListener('click', openSettings);

        // Reaction buttons
        document.querySelectorAll('.reaction-btn').forEach(btn => {
            btn.addEventListener('click', function () {
                sendReaction(this.dataset.reaction);
            });
        });

        // Student control functions
        let isHandRaised = false;

        function toggleRaiseHand() {
            const btn = document.getElementById('raiseHandBtn');
            isHandRaised = !isHandRaised;

            if (isHandRaised) {
                btn.classList.add('active');
                // TODO: Send raise hand signal to faculty
                console.log('✋ Hand raised');
            } else {
                btn.classList.remove('active');
                console.log('✋ Hand lowered');
            }
        }

        function toggleReactions() {
            const menu = document.getElementById('reactionsMenu');
            menu.classList.toggle('show');
        }

        function sendReaction(emoji) {
            // TODO: Send reaction to all participants
            console.log('Reaction sent:', emoji);

            // Hide reactions menu
            document.getElementById('reactionsMenu').classList.remove('show');

            // Show reaction animation (optional)
            alert(`Sent reaction: ${emoji}`);
        }

        function toggleChat() {
            // TODO: Open chat panel
            alert('Chat feature - Coming soon!');
        }

        function showParticipants() {
            const count = Object.keys(remoteUsers).length + 1;
            alert(`Participants: ${count}\n\nYou and ${Object.keys(remoteUsers).length} other(s)`);
        }

        function openSettings() {
            alert('Settings - Audio/Video device selection coming soon!');
        }

        // Close reactions menu when clicking outside
        document.addEventListener('click', function (e) {
            const reactionsBtn = document.getElementById('reactionsBtn');
            const reactionsMenu = document.getElementById('reactionsMenu');

            if (!reactionsBtn.contains(e.target) && !reactionsMenu.contains(e.target)) {
                reactionsMenu.classList.remove('show');
            }
        });

        // Clean up on page unload
        window.addEventListener('beforeunload', async () => {
            if (localAudioTrack) localAudioTrack.close();
            if (localVideoTrack) localVideoTrack.close();
            if (agoraClient) await agoraClient.leave();
        });
    </script>
</body>

</html>
