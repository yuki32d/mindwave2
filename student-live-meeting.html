<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Meeting - MindWave</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #202124;
            color: #e8eaed;
        }

        .join-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }

        .join-card {
            background: #292a2d;
            border-radius: 16px;
            padding: 48px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .join-title {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .join-subtitle {
            color: #9aa0a6;
            margin-bottom: 32px;
            font-size: 16px;
        }

        .code-input {
            width: 100%;
            background: #3c4043;
            border: 2px solid #5f6368;
            border-radius: 12px;
            padding: 16px 20px;
            color: #e8eaed;
            font-size: 24px;
            text-align: center;
            letter-spacing: 8px;
            font-weight: 600;
            margin-bottom: 24px;
            transition: border-color 0.2s;
        }

        .code-input:focus {
            outline: none;
            border-color: #1a73e8;
        }

        .join-btn {
            width: 100%;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .join-btn:hover {
            background: #1557b0;
        }

        .join-btn:disabled {
            background: #5f6368;
            cursor: not-allowed;
        }

        .back-btn {
            margin-top: 24px;
            background: transparent;
            color: #9aa0a6;
            border: none;
            padding: 12px;
            font-size: 14px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .back-btn:hover {
            color: #e8eaed;
        }

        #meeting-frame {
            display: none;
            width: 100vw;
            height: 100vh;
            border: none;
            position: fixed;
            top: 0;
            left: 0;
        }

        .loading {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #e8eaed;
            font-size: 18px;
            text-align: center;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #3c4043;
            border-top-color: #1a73e8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="join-container" id="joinContainer">
        <div class="join-card">
            <h1 class="join-title">Join Meeting</h1>
            <p class="join-subtitle">Enter the 6-digit meeting code</p>

            <input type="text" class="code-input" id="codeInput" placeholder="000000" maxlength="6" pattern="[0-9]*"
                inputmode="numeric">

            <button class="join-btn" id="joinBtn">Join Meeting</button>

            <button class="back-btn" onclick="window.location.href='student-community.html'">
                ← Back to Dashboard
            </button>
        </div>
    </div>

    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
        <p>Joining meeting...</p>
    </div>

    <iframe id="meeting-frame" allow="camera; microphone; display-capture; autoplay"></iframe>

    <script>
        const codeInput = document.getElementById('codeInput');
        const joinBtn = document.getElementById('joinBtn');

        // Get user info from token
        const token = localStorage.getItem('token');
        let userName = 'Student';
        let userId = 'student-' + Math.random().toString(36).substr(2, 9);

        if (token) {
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                userName = payload.name || 'Student';
                userId = payload.userId || userId;
            } catch (e) {
                console.log('Could not parse token');
            }
        }

        // Auto-format code input
        codeInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/\D/g, '').substring(0, 6);
            joinBtn.disabled = e.target.value.length !== 6;
        });

        // Join on Enter key
        codeInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && codeInput.value.length === 6) {
                joinMeeting();
            }
        });

        // Join button click
        joinBtn.addEventListener('click', joinMeeting);

        function joinMeeting() {
            const meetingCode = codeInput.value;

            if (meetingCode.length !== 6) {
                alert('Please enter a valid 6-digit code');
                return;
            }

            // Hide join form, show loading
            document.getElementById('joinContainer').style.display = 'none';
            document.getElementById('loading').style.display = 'block';

            // Build MediaSoup URL
            // For local testing: http://localhost:3000
            // For production: https://mindwave-meet.onrender.com
            const mediasoupUrl = 'http://localhost:3000';
            const roomId = 'mindwave-' + meetingCode;

            const iframeUrl = `${mediasoupUrl}?roomId=${roomId}&displayName=${encodeURIComponent(userName)}&produce=true&consume=true`;

            // Load iframe
            const iframe = document.getElementById('meeting-frame');
            iframe.src = iframeUrl;

            iframe.onload = () => {
                document.getElementById('loading').style.display = 'none';
                iframe.style.display = 'block';
            };

            // Log meeting info
            console.log('Joining Meeting Code:', meetingCode);
            console.log('Room ID:', roomId);
            console.log('Student:', userName);
        }

        // Focus on input
        codeInput.focus();
    </script>
</body>

</html>
