<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Meeting - MindWave</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #202124;
            color: #e8eaed;
        }

        .join-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }

        .join-card {
            background: #292a2d;
            border-radius: 16px;
            padding: 48px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .join-title {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .join-subtitle {
            color: #9aa0a6;
            margin-bottom: 32px;
            font-size: 16px;
        }

        .code-input {
            width: 100%;
            background: #3c4043;
            border: 2px solid #5f6368;
            border-radius: 12px;
            padding: 16px 20px;
            color: #e8eaed;
            font-size: 24px;
            text-align: center;
            letter-spacing: 8px;
            font-weight: 600;
            margin-bottom: 24px;
            transition: border-color 0.2s;
        }

        .code-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .join-btn {
            width: 100%;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .join-btn:hover {
            background: #5568d3;
        }

        .join-btn:disabled {
            background: #5f6368;
            cursor: not-allowed;
        }

        .back-btn {
            margin-top: 24px;
            background: transparent;
            color: #9aa0a6;
            border: none;
            padding: 12px;
            font-size: 14px;
            cursor: pointer;
            transition: color 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .back-btn:hover {
            color: #e8eaed;
        }
    </style>
</head>

<body>
    <div class="join-container" id="joinContainer">
        <div class="join-card">
            <h1 class="join-title">Join Meeting</h1>
            <p class="join-subtitle">Enter the 6-digit meeting code</p>

            <input type="text" class="code-input" id="codeInput" placeholder="000000" maxlength="6" pattern="[0-9]*"
                inputmode="numeric">

            <button class="join-btn" id="joinBtn" disabled>Join Meeting</button>

            <a href="homepage.html" class="back-btn">
                ← Back to Dashboard
            </a>
        </div>
    </div>

    <script src="student-live-meeting.js"></script>
</body>

</html>
