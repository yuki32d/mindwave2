<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Meeting - MindWave</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #202124;
            color: #e8eaed;
        }

        /* Join Screen */
        .join-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }

        .join-card {
            background: #292a2d;
            border-radius: 16px;
            padding: 48px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .join-title {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .join-subtitle {
            color: #9aa0a6;
            margin-bottom: 32px;
            font-size: 16px;
        }

        .code-input {
            width: 100%;
            background: #3c4043;
            border: 2px solid #5f6368;
            border-radius: 12px;
            padding: 16px 20px;
            color: #e8eaed;
            font-size: 24px;
            text-align: center;
            letter-spacing: 8px;
            font-weight: 600;
            margin-bottom: 24px;
            transition: border-color 0.2s;
        }

        .code-input:focus {
            outline: none;
            border-color: #1a73e8;
        }

        .join-btn {
            width: 100%;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 16px;
        }

        .join-btn:hover {
            background: #1557b0;
        }

        .join-btn:disabled {
            background: #3c4043;
            color: #5f6368;
            cursor: not-allowed;
        }

        .back-btn {
            width: 100%;
            background: #3c4043;
            color: #e8eaed;
            border: none;
            border-radius: 12px;
            padding: 12px 24px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .back-btn:hover {
            background: #5f6368;
        }

        .error-message {
            color: #ea4335;
            font-size: 14px;
            margin-top: 12px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        /* Meeting Container */
        .meeting-container {
            display: none;
            width: 100vw;
            height: 100vh;
        }

        .meeting-container.active {
            display: block;
        }

        #jitsi-container {
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>
    <!-- Join Screen -->
    <div class="join-container" id="joinContainer">
        <div class="join-card">
            <h1 class="join-title">Join Live Class</h1>
            <p class="join-subtitle">Enter the 6-digit code shared by your teacher</p>

            <input type="text" class="code-input" id="codeInput" placeholder="000000" maxlength="6" pattern="[0-9]*"
                inputmode="numeric">
            <div class="error-message" id="errorMessage">Invalid code. Please try again.</div>

            <button class="join-btn" id="joinBtn" disabled>Join Meeting</button>
            <button class="back-btn" id="backBtn">Back to Dashboard</button>
        </div>
    </div>

    <!-- Meeting Container -->
    <div class="meeting-container" id="meetingContainer">
        <div id="jitsi-container"></div>
    </div>

    <script src="https://meet.jit.si/external_api.js"></script>
    <script>
        const codeInput = document.getElementById('codeInput');
        const joinBtn = document.getElementById('joinBtn');
        const errorMessage = document.getElementById('errorMessage');

        // Auto-format code input
        codeInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/\D/g, '').substring(0, 6);
            errorMessage.classList.remove('show');
            joinBtn.disabled = e.target.value.length !== 6;
        });

        // Join on Enter key
        codeInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && codeInput.value.length === 6) {
                joinMeeting();
            }
        });

        // Join button click
        joinBtn.addEventListener('click', joinMeeting);

        // Back button
        document.getElementById('backBtn').addEventListener('click', () => {
            window.location.href = 'student-community.html';
        });

        // Get user info
        const token = localStorage.getItem('token');
        let userName = 'Student';

        if (token) {
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                userName = payload.name || 'Student';
            } catch (e) {
                console.log('Could not parse token');
            }
        }

        function joinMeeting() {
            const meetingCode = codeInput.value;

            if (meetingCode.length !== 6) {
                errorMessage.textContent = 'Please enter a 6-digit code';
                errorMessage.classList.add('show');
                return;
            }

            // Hide join screen, show meeting
            document.getElementById('joinContainer').style.display = 'none';
            document.getElementById('meetingContainer').classList.add('active');

            // Jitsi Meet configuration
            const domain = 'meet.jit.si';
            const options = {
                roomName: `MindWave_${meetingCode}`,
                width: '100%',
                height: '100%',
                parentNode: document.getElementById('jitsi-container'),
                configOverwrite: {
                    startWithAudioMuted: false,
                    startWithVideoMuted: false,
                    enableWelcomePage: false,
                    prejoinPageEnabled: false,
                    disableDeepLinking: true,
                    // Disable authentication
                    enableUserRolesBasedOnToken: false,
                    enableInsecureRoomNameWarning: false,
                    hideConferenceSubject: true,
                    hideConferenceTimer: false
                },
                interfaceConfigOverwrite: {
                    TOOLBAR_BUTTONS: [
                        'microphone', 'camera', 'closedcaptions', 'desktop',
                        'fullscreen', 'fodeviceselection', 'hangup', 'profile',
                        'chat', 'raisehand', 'videoquality', 'filmstrip',
                        'feedback', 'stats', 'shortcuts', 'tileview', 'help'
                    ],
                    // Hide Jitsi branding
                    SHOW_JITSI_WATERMARK: false,
                    SHOW_WATERMARK_FOR_GUESTS: false,
                    SHOW_BRAND_WATERMARK: false,
                    BRAND_WATERMARK_LINK: '',
                    JITSI_WATERMARK_LINK: '',
                    DEFAULT_BACKGROUND: '#202124',
                    DISABLE_JOIN_LEAVE_NOTIFICATIONS: true,
                    HIDE_INVITE_MORE_HEADER: true,
                    MOBILE_APP_PROMO: false
                },
                userInfo: {
                    displayName: userName,
                    email: ''
                }
            };

            // Initialize Jitsi Meet
            const api = new JitsiMeetExternalAPI(domain, options);

            // Event listeners
            api.addEventListener('videoConferenceJoined', () => {
                console.log('Successfully joined meeting');
            });

            api.addEventListener('readyToClose', () => {
                window.location.href = 'student-community.html';
            });
        }

        // Focus code input
        codeInput.focus();
    </script>
</body>

</html>
