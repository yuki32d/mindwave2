<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Meeting - MindWave</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #202124;
            color: #e8eaed;
        }

        .join-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }

        .join-card {
            background: #292a2d;
            border-radius: 16px;
            padding: 48px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .join-title {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .join-subtitle {
            color: #9aa0a6;
            margin-bottom: 32px;
            font-size: 16px;
        }

        .code-input {
            width: 100%;
            background: #3c4043;
            border: 2px solid #5f6368;
            border-radius: 12px;
            padding: 16px 20px;
            color: #e8eaed;
            font-size: 24px;
            text-align: center;
            letter-spacing: 8px;
            font-weight: 600;
            margin-bottom: 24px;
            transition: border-color 0.2s;
        }

        .code-input:focus {
            outline: none;
            border-color: #1a73e8;
        }

        .join-btn {
            width: 100%;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 16px;
        }

        .join-btn:hover {
            background: #1557b0;
        }

        .join-btn:disabled {
            background: #3c4043;
            color: #5f6368;
            cursor: not-allowed;
        }

        .back-btn {
            width: 100%;
            background: #3c4043;
            color: #e8eaed;
            border: none;
            border-radius: 12px;
            padding: 12px 24px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .back-btn:hover {
            background: #5f6368;
        }

        .meeting-container {
            display: none;
            width: 100vw;
            height: 100vh;
        }

        .meeting-container.active {
            display: block;
        }

        #daily-container {
            width: 100%;
            height: 100%;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

<body>
    <div class="join-container" id="joinContainer">
        <div class="join-card">
            <h1 class="join-title">Join Live Class</h1>
            <p class="join-subtitle">Enter the 6-digit code shared by your teacher</p>

            <input type="text" class="code-input" id="codeInput" placeholder="000000" maxlength="6" pattern="[0-9]*"
                inputmode="numeric">

            <button class="join-btn" id="joinBtn" disabled>Join Meeting</button>
            <button class="back-btn" id="backBtn">Back to Dashboard</button>
        </div>
    </div>

    <div class="meeting-container" id="meetingContainer">
        <div id="daily-container"></div>
    </div>

    <script>
        const codeInput = document.getElementById('codeInput');
        const joinBtn = document.getElementById('joinBtn');

        codeInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/\D/g, '').substring(0, 6);
            joinBtn.disabled = e.target.value.length !== 6;
        });

        codeInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && codeInput.value.length === 6) {
                joinMeeting();
            }
        });

        joinBtn.addEventListener('click', joinMeeting);
        document.getElementById('backBtn').addEventListener('click', () => {
            window.location.href = 'student-community.html';
        });

        const token = localStorage.getItem('token');
        let userName = 'Student';

        if (token) {
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                userName = payload.name || 'Student';
            } catch (e) {
                console.log('Could not parse token');
            }
        }

        function joinMeeting() {
            const meetingCode = codeInput.value;

            if (meetingCode.length !== 6) {
                alert('Please enter a 6-digit code');
                return;
            }

            document.getElementById('joinContainer').style.display = 'none';
            document.getElementById('meetingContainer').classList.add('active');

            // Using OUR customized Jitsi deployed on Render
            const roomName = 'MindWave' + meetingCode;
            const jitsiUrl = `/jitsi/#/${roomName}`;

            // Create iframe for our custom Jitsi
            const iframe = document.createElement('iframe');
            iframe.src = jitsiUrl;
            iframe.allow = 'camera; microphone; fullscreen; display-capture; autoplay';
            document.getElementById('daily-container').appendChild(iframe);
        }

        codeInput.focus();
    </script>
</body>

</html>
