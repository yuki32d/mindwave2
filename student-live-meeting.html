<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Meeting - MindWave</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #202124;
            color: #e8eaed;
            overflow: hidden;
        }

        /* Join Screen */
        .join-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 24px;
        }

        .join-card {
            background: #292a2d;
            border-radius: 16px;
            padding: 48px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .join-title {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .join-subtitle {
            color: #9aa0a6;
            margin-bottom: 32px;
            font-size: 16px;
        }

        .code-input-container {
            margin-bottom: 32px;
        }

        .code-input {
            width: 100%;
            background: #3c4043;
            border: 2px solid #5f6368;
            border-radius: 12px;
            padding: 16px 20px;
            color: #e8eaed;
            font-size: 24px;
            text-align: center;
            letter-spacing: 8px;
            font-weight: 600;
            transition: border-color 0.2s;
        }

        .code-input:focus {
            outline: none;
            border-color: #1a73e8;
        }

        .code-input::placeholder {
            color: #5f6368;
            letter-spacing: 4px;
        }

        .join-btn {
            width: 100%;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 16px;
        }

        .join-btn:hover {
            background: #1557b0;
        }

        .join-btn:disabled {
            background: #3c4043;
            color: #5f6368;
            cursor: not-allowed;
        }

        .back-btn {
            width: 100%;
            background: #3c4043;
            color: #e8eaed;
            border: none;
            border-radius: 12px;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .back-btn:hover {
            background: #5f6368;
        }

        .error-message {
            color: #ea4335;
            font-size: 14px;
            margin-top: 12px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        /* Meeting Container (hidden initially) */
        .meeting-container {
            display: none;
            flex-direction: column;
            height: 100vh;
            position: relative;
        }

        .meeting-container.active {
            display: flex;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
            background: #202124;
            border-bottom: 1px solid #3c4043;
        }

        .meeting-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .meeting-code {
            background: #3c4043;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        .meeting-time {
            color: #9aa0a6;
            font-size: 13px;
        }

        .participant-count {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #3c4043;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
        }

        /* Video Grid */
        .video-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 16px;
            padding: 24px;
            overflow-y: auto;
        }

        .video-tile {
            position: relative;
            background: #3c4043;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 16/9;
        }

        .video-tile video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-tile.active-speaker {
            border: 3px solid #1a73e8;
        }

        .participant-name {
            position: absolute;
            bottom: 12px;
            left: 12px;
            background: rgba(0, 0, 0, 0.7);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        .muted-indicator {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(234, 67, 53, 0.9);
            padding: 6px;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Bottom Toolbar */
        .bottom-toolbar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            padding: 20px;
            background: #202124;
            border-top: 1px solid #3c4043;
        }

        .toolbar-btn {
            background: #3c4043;
            border: none;
            color: #e8eaed;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.2s;
        }

        .toolbar-btn:hover {
            background: #5f6368;
        }

        .toolbar-btn.active {
            background: #1a73e8;
        }

        .toolbar-btn.danger {
            background: #ea4335;
        }

        .toolbar-btn.danger:hover {
            background: #d33b2c;
        }

        /* Right Sidebar */
        .right-sidebar {
            position: fixed;
            right: 0;
            top: 0;
            width: 360px;
            height: 100vh;
            background: #202124;
            border-left: 1px solid #3c4043;
            transform: translateX(100%);
            transition: transform 0.3s;
            z-index: 100;
        }

        .right-sidebar.open {
            transform: translateX(0);
        }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid #3c4043;
        }

        .sidebar-title {
            font-size: 18px;
            font-weight: 600;
        }

        .close-btn {
            background: none;
            border: none;
            color: #9aa0a6;
            cursor: pointer;
            padding: 6px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .close-btn:hover {
            background: #3c4043;
            color: #e8eaed;
        }

        .sidebar-content {
            height: calc(100vh - 60px);
            overflow-y: auto;
            padding: 16px;
        }

        /* Chat */
        .chat-messages {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 16px;
        }

        .chat-message {
            background: #3c4043;
            padding: 12px;
            border-radius: 8px;
        }

        .message-sender {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 4px;
        }

        .message-text {
            font-size: 14px;
            line-height: 1.5;
        }

        .chat-input-container {
            position: sticky;
            bottom: 0;
            background: #202124;
            padding: 16px;
            border-top: 1px solid #3c4043;
        }

        .chat-input {
            width: 100%;
            background: #3c4043;
            border: 1px solid #5f6368;
            border-radius: 8px;
            padding: 12px;
            color: #e8eaed;
            font-size: 14px;
            resize: none;
        }

        /* Captions */
        .captions-container {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 12px 24px;
            border-radius: 8px;
            max-width: 80%;
            text-align: center;
            display: none;
        }

        .captions-container.active {
            display: block;
        }

        /* Raise Hand Indicator */
        .hand-raised {
            position: absolute;
            top: 12px;
            right: 12px;
            background: #fbbc04;
            padding: 8px;
            border-radius: 50%;
            font-size: 20px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }
        }
    </style>
</head>

<body>
    <!-- Join Screen -->
    <div class="join-container" id="joinContainer">
        <div class="join-card">
            <h1 class="join-title">Join Live Class</h1>
            <p class="join-subtitle">Enter the 6-digit code shared by your teacher</p>

            <div class="code-input-container">
                <input type="text" class="code-input" id="codeInput" placeholder="000000" maxlength="6" pattern="[0-9]*"
                    inputmode="numeric">
                <div class="error-message" id="errorMessage">Invalid code. Please try again.</div>
            </div>

            <button class="join-btn" id="joinBtn">Join Meeting</button>
            <button class="back-btn" id="backBtn">Back to Dashboard</button>
        </div>
    </div>

    <!-- Meeting Container -->
    <div class="meeting-container" id="meetingContainer">
        <!-- Top Bar -->
        <div class="top-bar">
            <div class="meeting-info">
                <div class="meeting-code" id="meetingCodeDisplay">------</div>
                <div class="meeting-time" id="meetingTime">00:00</div>
            </div>
            <div class="participant-count" id="participantCount">
                <span>👥</span>
                <span id="participantNumber">1</span>
            </div>
        </div>

        <!-- Video Grid -->
        <div class="video-grid" id="videoGrid">
            <div class="video-tile">
                <video id="localVideo" autoplay muted playsinline></video>
                <div class="participant-name">You</div>
                <div class="hand-raised" id="handRaised" style="display: none;">✋</div>
            </div>
        </div>

        <!-- Captions -->
        <div class="captions-container" id="captionsContainer">
            <div id="captionText"></div>
        </div>

        <!-- Bottom Toolbar -->
        <div class="bottom-toolbar">
            <button class="toolbar-btn" id="micBtn" title="Mute/Unmute">
                <span id="micIcon">🎤</span>
            </button>
            <button class="toolbar-btn" id="cameraBtn" title="Turn camera on/off">
                <span id="cameraIcon">📹</span>
            </button>
            <button class="toolbar-btn" id="raiseHandBtn" title="Raise hand">
                <span>✋</span>
            </button>
            <button class="toolbar-btn" id="chatBtn" title="Chat">
                <span>💭</span>
            </button>
            <button class="toolbar-btn danger" id="leaveBtn" title="Leave meeting">
                <span>📞</span>
            </button>
        </div>

        <!-- Right Sidebar (Chat) -->
        <div class="right-sidebar" id="rightSidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">Chat</div>
                <button class="close-btn" id="closeSidebar">✕</button>
            </div>
            <div class="sidebar-content">
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-container">
                    <textarea class="chat-input" id="chatInput" placeholder="Send a message..." rows="2"></textarea>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
    <script src="student-live-meeting.js"></script>
</body>

</html>
