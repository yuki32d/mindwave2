<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Meeting - MindWave</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #202124;
            overflow: hidden;
        }

        #meeting-frame {
            width: 100vw;
            height: 100vh;
            border: none;
        }

        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #e8eaed;
            font-size: 18px;
            text-align: center;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #3c4043;
            border-top-color: #1a73e8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
        <p>Starting meeting...</p>
    </div>

    <iframe id="meeting-frame" allow="camera; microphone; display-capture; autoplay"></iframe>

    <script>
        // Get user info from token
        const token = localStorage.getItem('token');
        let userName = 'Faculty';
        let userId = 'faculty-' + Math.random().toString(36).substr(2, 9);

        if (token) {
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                userName = payload.name || 'Faculty';
                userId = payload.userId || userId;
            } catch (e) {
                console.log('Could not parse token');
            }
        }

        // Generate 6-digit meeting code
        const meetingCode = Math.floor(100000 + Math.random() * 900000).toString();

        // Build MediaSoup URL
        // For local testing: http://localhost:3000
        // For production: https://mindwave-meet.onrender.com
        const mediasoupUrl = 'http://localhost:3000';
        const roomId = 'mindwave-' + meetingCode;

        const iframeUrl = `${mediasoupUrl}?roomId=${roomId}&displayName=${encodeURIComponent(userName)}&produce=true&consume=true`;

        // Load iframe
        const iframe = document.getElementById('meeting-frame');
        iframe.src = iframeUrl;

        iframe.onload = () => {
            document.getElementById('loading').style.display = 'none';
        };

        // Store meeting code for sharing
        sessionStorage.setItem('currentMeetingCode', meetingCode);

        // Log meeting info
        console.log('Meeting Code:', meetingCode);
        console.log('Room ID:', roomId);
        console.log('Faculty:', userName);
    </script>
</body>

</html>
