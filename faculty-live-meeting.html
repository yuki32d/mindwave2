<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Meeting - MindWave</title>
    <script src="https://meet.jit.si/external_api.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #202124;
            color: #e8eaed;
            overflow: hidden;
        }

        .meeting-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .meeting-header {
            background: #292a2d;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #3c4043;
            z-index: 1000;
        }

        .meeting-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .meeting-code {
            background: #3c4043;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .meeting-code:hover {
            background: #5f6368;
        }

        .copy-btn,
        .whatsapp-btn {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .copy-btn:hover {
            background: #1557b0;
        }

        .whatsapp-btn {
            background: #25D366;
        }

        .whatsapp-btn:hover {
            background: #1da851;
        }

        .back-btn {
            background: #ea4335;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .back-btn:hover {
            background: #d33426;
        }

        #jitsi-container {
            flex: 1;
            width: 100%;
        }
    </style>
</head>

<body>
    <div class="meeting-container">
        <div class="meeting-header">
            <div class="meeting-info">
                <span style="font-weight: 600;">Meeting Code:</span>
                <div class="meeting-code" id="meetingCode">Loading...</div>
                <button class="copy-btn" id="copyBtn">📋 Copy</button>
                <button class="whatsapp-btn" id="whatsappBtn">📱 WhatsApp</button>
            </div>
            <button class="back-btn" id="endBtn">End Meeting</button>
        </div>
        <div id="jitsi-container"></div>
    </div>

    <script>
        // Generate 6-digit meeting code
        const meetingCode = Math.floor(100000 + Math.random() * 900000).toString();
        document.getElementById('meetingCode').textContent = meetingCode;

        // Get user info
        const token = localStorage.getItem('token');
        let userName = 'Faculty';

        if (token) {
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                userName = payload.name || 'Faculty';
            } catch (e) {
                console.log('Could not parse token');
            }
        }

        // Add event listeners
        document.getElementById('copyBtn').addEventListener('click', copyCode);
        document.getElementById('whatsappBtn').addEventListener('click', shareWhatsApp);
        document.getElementById('endBtn').addEventListener('click', endMeeting);
        document.getElementById('meetingCode').addEventListener('click', copyCode);

        // Initialize Jitsi Meet - Using FREE public server (meet.jit.si)
        const domain = 'meet.jit.si';
        const options = {
            roomName: 'MindWave' + meetingCode,
            width: '100%',
            height: '100%',
            parentNode: document.getElementById('jitsi-container'),
            userInfo: {
                displayName: userName
            },
            configOverwrite: {
                startWithAudioMuted: false,
                startWithVideoMuted: false,
                prejoinPageEnabled: false,
                disableDeepLinking: true
            },
            interfaceConfigOverwrite: {
                SHOW_JITSI_WATERMARK: false,
                SHOW_WATERMARK_FOR_GUESTS: false,
                SHOW_BRAND_WATERMARK: false,
                BRAND_WATERMARK_LINK: '',
                SHOW_POWERED_BY: false,
                DISPLAY_WELCOME_PAGE_CONTENT: false,
                DISPLAY_WELCOME_PAGE_TOOLBAR_ADDITIONAL_CONTENT: false,
                APP_NAME: 'MindWave',
                NATIVE_APP_NAME: 'MindWave',
                PROVIDER_NAME: 'MindWave College',
                TOOLBAR_BUTTONS: [
                    'microphone', 'camera', 'closedcaptions', 'desktop', 'embedmeeting', 'fullscreen',
                    'fodeviceselection', 'hangup', 'profile', 'chat', 'recording',
                    'livestreaming', 'etherpad', 'sharedvideo', 'shareaudio', 'settings', 'raisehand',
                    'videoquality', 'filmstrip', 'invite', 'feedback', 'stats', 'shortcuts',
                    'tileview', 'select-background', 'download', 'help', 'mute-everyone', 'mute-video-everyone',
                    'security'
                ]
            }
        };

        const api = new JitsiMeetExternalAPI(domain, options);

        // Copy meeting code
        function copyCode() {
            navigator.clipboard.writeText(meetingCode);
            const btn = document.getElementById('copyBtn');
            const originalText = btn.textContent;
            btn.textContent = '✓ Copied!';
            setTimeout(() => {
                btn.textContent = originalText;
            }, 2000);
        }

        // Share on WhatsApp
        function shareWhatsApp() {
            const message = `Join my MindWave live class!\n\nMeeting Code: ${meetingCode}\n\nGo to: ${window.location.origin}/student-live-meeting.html`;
            const url = `https://wa.me/?text=${encodeURIComponent(message)}`;
            window.open(url, '_blank');
        }

        // End meeting
        function endMeeting() {
            if (confirm('End meeting and return to dashboard?')) {
                api.dispose();
                window.location.href = 'admin.html';
            }
        }
    </script>
</body>

</html>
