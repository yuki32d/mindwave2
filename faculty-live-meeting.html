<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starting Meeting - MindWave</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Google Sans', 'Roboto', Arial, sans-serif;
            background: #202124;
            color: #e8eaed;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .loading {
            text-align: center;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #3c4043;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        h2 {
            font-size: 20px;
            font-weight: 400;
            color: #e8eaed;
        }
    </style>
</head>

<body>
    <div class="loading">
        <div class="spinner"></div>
        <h2>Starting your meeting...</h2>
    </div>

    <script>
        // Get user info
        const token = localStorage.getItem('token');
        let userName = 'Faculty';

        if (token) {
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                userName = payload.name || 'Faculty';
            } catch (e) {
                console.log('Could not parse token');
            }
        }

        // Generate meeting code and redirect immediately
        const meetingCode = Math.floor(100000 + Math.random() * 900000).toString();
        const roomName = 'MindWave' + meetingCode;
        const meetingUrl = `https://meet.jit.si/${roomName}`;

        console.log('Meeting Code:', meetingCode);
        console.log('Meeting URL:', meetingUrl);

        // Redirect immediately to Jitsi
        window.location.href = meetingUrl;
    </script>
</body>

</html>
