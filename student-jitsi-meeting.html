<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindWave Meeting - Student</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Google Sans', 'Roboto', Arial, sans-serif;
            background: #202124;
            color: #e8eaed;
            overflow: hidden;
        }

        #jitsi-container {
            width: 100vw;
            height: 100vh;
        }

        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #202124;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .loading-screen.hidden {
            display: none;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #4285f4;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            font-size: 18px;
            color: #9aa0a6;
        }
    </style>
</head>

<body>
    <div class="loading-screen" id="loadingScreen">
        <div class="spinner"></div>
        <div class="loading-text">Joining meeting...</div>
    </div>

    <div id="jitsi-container"></div>

    <!-- Jitsi Meet External API -->
    <script src='https://meet.jit.si/external_api.js'></script>

    <script>
        // Get meeting code from URL
        const urlParams = new URLSearchParams(window.location.search);
        const meetingCode = urlParams.get('code');
        const userName = urlParams.get('name') || 'Student';

        if (!meetingCode) {
            alert('No meeting code provided');
            window.location.href = 'student-live-meeting.html';
        }

        const roomName = 'MindWave' + meetingCode;

        // Configure Jitsi with RESTRICTED toolbar for students
        const options = {
            roomName: roomName,
            width: '100%',
            height: '100%',
            parentNode: document.querySelector('#jitsi-container'),
            configOverwrite: {
                startWithAudioMuted: true,
                startWithVideoMuted: false,
                disableModeratorIndicator: false,
                enableLobby: false,
                prejoinPageEnabled: false,
                // RESTRICTED TOOLBAR - Remove participant management buttons
                toolbarButtons: [
                    'microphone',
                    'camera',
                    'closedcaptions',
                    'desktop',
                    'fullscreen',
                    'fodeviceselection',
                    'hangup',
                    'chat',
                    'raisehand',
                    'videoquality',
                    'filmstrip',
                    'settings',
                    'tileview',
                    'videobackgroundblur',
                    'help'
                    // EXCLUDED: 'invite', 'participants-pane' (these allow kick/mute)
                ],
                disableRemoteMute: true,
                disableKick: true
            },
            interfaceConfigOverwrite: {
                DISABLE_FOCUS_INDICATOR: false,
                DISABLE_DOMINANT_SPEAKER_INDICATOR: false,
                HIDE_INVITE_MORE_HEADER: true,
                DISABLE_VIDEO_BACKGROUND: false,
                SHOW_JITSI_WATERMARK: false,
                SHOW_WATERMARK_FOR_GUESTS: false,
                TOOLBAR_ALWAYS_VISIBLE: false,
                MOBILE_APP_PROMO: false
            },
            userInfo: {
                displayName: userName
            }
        };

        // Initialize Jitsi Meet
        const api = new JitsiMeetExternalAPI('meet.jit.si', options);

        // Hide loading screen when ready
        api.addEventListener('videoConferenceJoined', () => {
            document.getElementById('loadingScreen').classList.add('hidden');
        });

        // Handle meeting end
        api.addEventListener('readyToClose', () => {
            window.location.href = 'homepage.html';
        });

        // Log events for debugging
        api.addEventListener('participantJoined', (participant) => {
            console.log('Participant joined:', participant);
        });

        api.addEventListener('participantLeft', (participant) => {
            console.log('Participant left:', participant);
        });
    </script>
</body>

</html>
