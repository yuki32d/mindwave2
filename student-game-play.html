<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindWave Pro Mode | Interactive Session</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236366f1' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' class='lucide lucide-brain-circuit'><path d='M12 4.5a2.5 2.5 0 0 0-4.96-.44l-.32 1.6d4a4.44 4.44 0 0 1-4.42 3.54 3 3 0 0 0 0 6 4.44 4.44 0 0 1 4.42 3.54l.32 1.6d4a2.5 2.5 0 0 0 4.96-.44' /><path d='M12 19.5a2.5 2.5 0 0 0 4.96.44l.32-1.6d4a4.44 4.44 0 0 1 4.42-3.54 3 3 0 0 0 0-6 4.44 4.44 0 0 1-4.42-3.54l-.32-1.6d4a2.5 2.5 0 0 0-4.96.44' /><circle cx='12' cy='12' r='3' /></svg>">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- CodeMirror -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/clike/clike.min.js"></script>
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --accent: #a855f7;
            --bg: #030712;
            --surface: rgba(17, 24, 39, 0.7);
            --border: rgba(255, 255, 255, 0.08);
            --text: #f9fafb;
            --text-muted: #9ca3af;
            --red: #ef4444;
            --glass: rgba(255, 255, 255, 0.02);
            --glass-strong: rgba(255, 255, 255, 0.05);
        }

        .CodeMirror {
            height: auto;
            min-height: 150px;
            border-radius: 12px;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 14px;
            border: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.2) !important;
            margin-bottom: 8px;
        }

        .cm-s-dracula.CodeMirror {
            background-color: transparent !important;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(168, 85, 247, 0.15) 0%, transparent 50%);
            color: var(--text);
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .pro-layout {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.6s ease-out;
            padding: 16px 24px;
            box-sizing: border-box;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .pro-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding: 0 10px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 16px rgba(99, 102, 241, 0.3);
        }

        .brand-text {
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(to right, #fff, #9ca3af);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .session-badge {
            background: var(--glass-strong);
            padding: 6px 14px;
            border-radius: 99px;
            border: 1px solid var(--border);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--primary-light);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .pro-card {
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        #appContainer {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }


        .pro-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), var(--accent), transparent);
            opacity: 0.5;
        }

        #appContainer {
            width: 100%;
        }

        /* Anti-Cheat UI Enhancements */
        #cheat-warning {
            backdrop-filter: blur(12px) !important;
            border: 1px solid rgba(255, 59, 48, 0.3) !important;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5) !important;
        }

        /* Mobile Adjustments */
        @media (max-width: 640px) {
            .pro-layout { padding: 8px 12px; }
            .pro-card {
                padding: 18px;
                border-radius: 16px;
            }
            .pro-header {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }
        }

        /* Loading State */
        .loading-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 0;
            gap: 20px;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--glass-strong);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* --- Premium Game Component Styles --- */
        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        .timer {
            background: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
            padding: 4px 12px;
            border-radius: 99px;
            border: 1px solid rgba(245, 158, 11, 0.2);
            font-family: monospace;
            font-size: 0.95rem;
            font-weight: 700;
        }

        .question-display h2 {
            font-size: 1.75rem;
            font-weight: 800;
            line-height: 1.4;
            margin-bottom: 32px;
            letter-spacing: -0.02em;
            color: #fff;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .option-btn {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px 24px;
            color: var(--text);
            font-size: 1rem;
            font-weight: 600;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .option-btn:hover {
            background: var(--glass-strong);
            border-color: rgba(99, 102, 241, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .option-btn.selected {
            background: rgba(99, 102, 241, 0.15);
            border-color: var(--primary);
            color: var(--primary-light);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
        }

        .option-btn::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--border);
            transition: all 0.2s;
        }

        .option-btn.selected::before {
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary);
            transform: scale(1.5);
        }

        .submit-btn {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: #fff;
            border: none;
            padding: 16px 32px;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.25);
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(99, 102, 241, 0.35);
            filter: brightness(1.1);
        }

        .submit-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            filter: grayscale(0.5);
        }

        .secondary-btn {
            background: var(--glass-strong);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 16px 24px;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .secondary-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-1px);
        }

        .progress-bar {
            height: 6px;
            background: var(--glass-strong);
            border-radius: 99px;
            overflow: hidden;
            margin-top: 40px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 99px;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Results / Modal overides inside Pro Mode */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            animation: mwFadeIn 0.3s ease;
        }

        .scoreboard-content {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 48px;
            max-width: 600px;
            width: 90%;
            text-align: center;
            box-shadow: 0 32px 64px rgba(0, 0, 0, 0.5);
        }

        tr.current-student {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary-light);
            font-weight: 700;
        }

        tr.top-3 td:first-child {
            color: #fbbf24;
            font-weight: 800;
        }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes mwFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
    </style>
</head>
<body>

    <!-- Fullscreen Gate — browser requires a real user gesture to enter fullscreen.
         This single-click overlay is the only reliable cross-browser solution.
         It disappears immediately after click. -->
    <div id="fsGate" style="
        position: fixed; inset: 0; z-index: 99999999;
        background: #030712;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 20px; cursor: pointer;
    " onclick="enterGameFullscreen()">
        <div style="width:64px;height:64px;background:linear-gradient(135deg,#6366f1,#a855f7);border-radius:18px;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(99,102,241,0.4);">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </div>
        <h2 style="color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-size:1.6rem;font-weight:800;margin:0;">Click anywhere to start</h2>
        <p style="color:#6b7280;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.9rem;margin:0;">Game will open in secure fullscreen mode</p>
    </div>

    <div class="pro-layout">
        <header class="pro-header">
            <div class="brand">
                <div class="brand-icon">
                    <i data-lucide="brain-circuit" style="color: white; width: 24px; height: 24px;"></i>
                </div>
                <span class="brand-text">MindWave Pro</span>
            </div>
            <div class="session-badge">
                <i data-lucide="shield-check" style="width: 14px; height: 14px;"></i>
                Secure Session Active
            </div>
        </header>

        <main class="pro-card">
            <div id="appContainer">
                <div class="loading-wrap">
                    <div class="spinner"></div>
                    <p style="color: var(--text-muted); font-weight: 500;">Initializing secure environment...</p>
                </div>
            </div>
        </main>

        <!-- -- Scoreboard Modal -- -->
        <div id="scoreboardModal" class="modal" style="display:none;">
            <div class="scoreboard-content">
                <div style="margin-bottom: 32px;">
                    <div style="width: 64px; height: 64px; background: rgba(251, 191, 36, 0.1); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px;">
                        <i data-lucide="trophy" style="color:#fbbf24;width:32px;height:32px;"></i>
                    </div>
                    <h2 style="font-size: 2rem; font-weight: 800; color: #fff;">Game Complete!</h2>
                </div>

                <div id="studentScoreCard" style="margin-bottom: 32px;"></div>

                <div id="answerReviewSection" style="display:none; text-align: left; margin-bottom: 32px;">
                    <h3 style="font-size: 1rem; font-weight: 700; color: #fff; margin-bottom: 16px; display: flex; align-items: center; gap: 8px;">
                        <i data-lucide="clipboard-list" style="width:18px;height:18px;"></i>
                        Answer Review
                    </h3>
                    <div id="answerReviewList" style="display: flex; flex-direction: column; gap: 12px; max-height: 250px; overflow-y: auto; padding-right: 10px;"></div>
                </div>

                <div id="leaderboardSection" style="margin-bottom: 32px; text-align: left;">
                    <h3 style="font-size: 1rem; font-weight: 700; color: #fff; margin-bottom: 16px; display: flex; align-items: center; gap: 8px;">
                        <i data-lucide="award" style="width:18px;height:18px;"></i>
                        Leaderboard
                    </h3>
                    <div style="background: var(--glass-strong); border: 1px solid var(--border); border-radius: 16px; overflow: hidden;">
                        <table style="width: 100%; border-collapse: collapse; font-size: 0.85rem;">
                            <thead>
                                <tr style="background: rgba(255,255,255,0.03); color: var(--text-muted); border-bottom: 1px solid var(--border);">
                                    <th style="padding: 12px 16px; text-align: left;">Rank</th>
                                    <th style="padding: 12px 16px; text-align: left;">Student</th>
                                    <th style="padding: 12px 16px; text-align: left;">Score</th>
                                    <th style="padding: 12px 16px; text-align: left;">Games</th>
                                    <th style="padding: 12px 16px; text-align: left;">Accuracy</th>
                                </tr>
                            </thead>
                            <tbody id="leaderboardBody" style="color: var(--text);"></tbody>
                        </table>
                    </div>
                </div>

                <div style="display: flex; gap: 16px;">
                    <button id="playAgainBtn" class="secondary-btn" style="flex: 1; display:flex; align-items:center; justify-content:center; gap:8px;">
                        <i data-lucide="rotate-ccw" style="width:18px;height:18px;"></i> Play Again
                    </button>
                    <button id="backToGamesBtn" class="submit-btn" style="flex: 1; display:flex; align-items:center; justify-content:center; gap:8px;">
                        <i data-lucide="gamepad-2" style="width:18px;height:18px;"></i> Exit Pro Mode
                    </button>
                </div>
            </div>
        </div>

        <footer style="margin-top: 24px; text-align: center;">
            <p style="font-size: 0.75rem; color: var(--text-muted); opacity: 0.6;">
                &copy; 2026 MindWave Interactive. All activity is proctored for exam integrity.
            </p>
        </footer>
    </div>

    <!-- Scripts -->
    <script>
        // Check for standalone mode (standalone game play doesn't need certain elements)
        window.isProMode = true;
        



        // Set player initials from localStorage if available
        const firstName = localStorage.getItem('firstName') || '';
        const lastName = localStorage.getItem('lastName') || '';
        const fullName = [firstName, lastName].filter(Boolean).join(' ') || 'Student';

        // --- Fullscreen entry (triggered by user click on #fsGate) ---
        function enterGameFullscreen() {
            const gate = document.getElementById('fsGate');
            const el = document.documentElement;
            const req = el.requestFullscreen || el.webkitRequestFullscreen ||
                el.mozRequestFullScreen || el.msRequestFullscreen;
            if (req) {
                req.call(el)
                    .catch(() => {})
                    .finally(() => { if (gate) gate.style.display = 'none'; });
            } else {
                if (gate) gate.style.display = 'none';
            }
        }
        window.startFullscreenSession = enterGameFullscreen;

        // Lucide icons init
        document.addEventListener('DOMContentLoaded', () => {
            if (window.lucide) lucide.createIcons();
        });

        // When the game completes, release the fullscreen + unload locks
        // This runs AFTER anti-cheat.js has defined window.releaseGameLock
        document.addEventListener('DOMContentLoaded', () => {
            const exitBtn = document.getElementById('backToGamesBtn');
            if (exitBtn) {
                exitBtn.addEventListener('click', () => {
                    if (typeof window.releaseGameLock === 'function') window.releaseGameLock();
                });
            }
        });
    </script>
    <script src="anti-cheat.js"></script>
    <script src="student-game-engine.js"></script>
    <!-- Wire exit button AFTER anti-cheat.js so releaseGameLock is defined -->
    <script>
        (function() {
            const exitBtn = document.getElementById('backToGamesBtn');
            if (exitBtn) {
                exitBtn.addEventListener('click', function() {
                    if (typeof window.releaseGameLock === 'function') window.releaseGameLock();
                });
            }
        })();
    </script>
</body>
</html>
