<!DOCTYPE html>
<html lang="en">

<head>
    <script src="admin-theme-init.js"></script>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindWave – Admin Approvals</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="auth-guard.js"></script>
    <link rel="stylesheet" href="3d-depth-design.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #f4f6fb;
            --surface: #ffffff;
            --border: #e5e9f2;
            --accent: #d08000;
            --accent-lo: rgba(208, 128, 0, 0.10);
            --accent-bdr: rgba(208, 128, 0, 0.25);
            --text: #111827;
            --muted: #6b7280;
            --green: #16a34a;
            --red: #dc2626;
            --blue: #2563eb;
            --shadow: 0 1px 4px rgba(0, 0, 0, 0.07), 0 4px 16px rgba(0, 0, 0, 0.05);
            --radius: 14px;
            --topbar-h: 58px;
        }

        [data-theme="dark"] {
            --bg: #0d1117;
            --surface: #161b27;
            --border: rgba(255, 255, 255, 0.08);
            --text: #e2e8f0;
            --muted: #6b7694;
            --shadow: 0 1px 4px rgba(0, 0, 0, 0.4), 0 4px 16px rgba(0, 0, 0, 0.3);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .shell {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .topbar {
            height: var(--topbar-h);
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        [data-theme="dark"] .topbar {
            background: rgba(22, 27, 39, 0.8);
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 12px;
            color: var(--muted);
            font-weight: 600;
            font-size: 13px;
            transition: all 0.2s;
            text-decoration: none;
            border: 1px solid transparent;
        }

        .back-btn:hover {
            color: var(--accent);
            background: var(--accent-lo);
            border-color: var(--accent-bdr);
        }

        .main {
            flex: 1;
            padding: 40px 24px;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
        }

        .page-header {
            margin-bottom: 40px;
        }

        .page-eyebrow {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--accent);
            margin-bottom: 8px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: var(--text);
        }

        .page-subtitle {
            font-size: 14px;
            color: var(--muted);
            margin-top: 4px;
        }

        .pending-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .pending-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
            box-shadow: var(--shadow);
        }

        [data-theme="dark"] .pending-item {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
        }

        .pending-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .pending-email {
            font-size: 17px;
            font-weight: 700;
            color: var(--text);
        }

        .pending-date {
            font-size: 13px;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .pending-actions {
            display: flex;
            gap: 12px;
        }

        .action-btn {
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .approve-btn {
            background: var(--green);
            color: white;
        }

        .approve-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(22, 163, 74, 0.3);
        }

        .reject-btn {
            background: rgba(220, 38, 38, 0.05);
            color: var(--red);
            border-color: rgba(220, 38, 38, 0.1);
        }

        .reject-btn:hover {
            background: rgba(220, 38, 38, 0.1);
            border-color: var(--red);
        }

        .empty-state {
            text-align: center;
            padding: 60px 40px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: var(--shadow);
        }

        [data-theme="dark"] .empty-state {
            background: rgba(255, 255, 255, 0.02);
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 20px;
            color: var(--green);
            background: var(--accent-lo);
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 24px;
            margin: 0 auto 24px;
        }

        /* ── LOADING ── */
        .loading-container {
            text-align: center;
            padding: 60px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── MODALS & TOASTS ── */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .toast {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            display: flex;
            gap: 12px;
            align-items: center;
            animation: slideIn 0.3s forwards;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .confirm-modal {
            background: var(--surface);
            padding: 32px;
            border-radius: 24px;
            width: 400px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            border: none;
        }

        .confirm-ok {
            background: var(--accent);
            color: white;
        }

        .confirm-cancel {
            background: var(--bg);
            color: var(--muted);
        }
    </style>
</head>

<body>
    <div class="shell">
        <header class="topbar">
            <div class="topbar-left">
                <a href="faculty-settings.html" class="back-btn">
                    <i class="fas fa-arrow-left"></i> Settings
                </a>
            </div>
            <div style="width: 40px;"></div> <!-- Spacer -->
        </header>

        <main class="main">
            <div class="content-container">
                <header class="page-header">
                    <p class="page-eyebrow">Trust & Safety</p>
                    <h1 class="page-title">Admin Approvals</h1>
                    <p class="page-subtitle">Review and authorize new faculty account requests.</p>
                </header>

                <!-- Loading State -->
                <div id="loadingState" class="loading-container">
                    <div class="spinner"></div>
                    <p>Fetching requests...</p>
                </div>

                <!-- List Section -->
                <div id="pendingList" class="pending-list" style="display: none;">
                    <!-- Populated by JS -->
                </div>
            </div>
        </main>
    </div>

    <!-- Confirm Modal -->
    <div id="confirmModal" class="modal-overlay">
        <div class="confirm-modal">
            <div class="confirm-title" id="confirmTitle"
                style="font-size: 20px; font-weight: 800; margin-bottom: 12px;">Confirm Action</div>
            <div class="confirm-msg" id="confirmMsg" style="color: var(--muted); margin-bottom: 24px;">Are you sure?
            </div>
            <div class="modal-actions">
                <button class="modal-btn confirm-cancel" id="confirmCancel">Cancel</button>
                <button class="modal-btn confirm-ok" id="confirmOk">Confirm</button>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="admin-approvals.js"></script>
    <script>
        // ── OVERRIDE ALERT/CONFIRM ──
        window.alert = function (msg) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i class="fas fa-info-circle" style="color: var(--accent);"></i> <span>${msg}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        };

        let confirmResolve;
        window.confirm = function (msg) {
            document.getElementById('confirmMsg').textContent = msg;
            document.getElementById('confirmModal').classList.add('active');
            return new Promise(res => confirmResolve = res);
        };

        document.getElementById('confirmOk').onclick = () => {
            document.getElementById('confirmModal').classList.remove('active');
            confirmResolve(true);
        };
        document.getElementById('confirmCancel').onclick = () => {
            document.getElementById('confirmModal').classList.remove('active');
            confirmResolve(false);
        };
    </script>
</body>

</html>
