<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINDWAVE – Admin Approvals</title>
    <link rel="stylesheet" href="role-page.css">
    <link rel="stylesheet" href="theme.css">
    <script src="theme-init.js"></script>
    <style>
        .pending-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 32px;
        }

        .pending-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 28px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 32px;
            transition: all 0.3s ease;
        }

        .pending-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        .pending-info {
            flex: 1;
        }

        .pending-email {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text);
        }

        .pending-date {
            font-size: 14px;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .pending-date::before {
            content: "📅";
            font-size: 12px;
        }

        .pending-actions {
            display: flex;
            gap: 12px;
        }

        .approve-btn,
        .reject-btn {
            padding: 12px 24px;
            border-radius: 14px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .approve-btn {
            background: linear-gradient(120deg, #34c759, #30d158);
            color: white;
            box-shadow: 0 4px 12px rgba(52, 199, 89, 0.2);
        }

        .approve-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(52, 199, 89, 0.4);
        }

        .reject-btn {
            background: rgba(255, 59, 48, 0.1);
            color: #ff3b30;
            border: 1px solid rgba(255, 59, 48, 0.3);
        }

        .reject-btn:hover {
            background: rgba(255, 59, 48, 0.2);
            border-color: rgba(255, 59, 48, 0.5);
            transform: translateY(-2px);
        }

        .empty-state {
            text-align: center;
            padding: 80px 32px;
            color: var(--muted);
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
        }

        .empty-state .emoji {
            font-size: 64px;
            margin-bottom: 20px;
            display: block;
        }

        .empty-state h2 {
            margin: 0 0 12px;
            font-size: 28px;
        }

        @media (max-width: 768px) {
            .pending-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 20px;
            }

            .pending-actions {
                width: 100%;
                flex-direction: column;
            }

            .approve-btn,
            .reject-btn {
                width: 100%;
            }
        }
    </style>
</head>

<body data-role="faculty" data-section="approvals">
    <div class="page-shell">
        <header class="hero">
            <p class="eyebrow" id="heroEyebrow">Faculty Space</p>
            <h1 id="pageTitle">✅ Admin Approvals</h1>
            <p class="lede" id="pageSubtitle">Review and approve or reject admin account requests</p>
            <div class="hero-actions">
                <a class="ghost-link" href="faculty-settings.html">← Back to Dashboard</a>
            </div>
        </header>

        <!-- Loading State -->
        <div id="loadingState" class="loading-container">
            <div class="spinner"></div>
            <p>Loading pending requests...</p>
        </div>

        <!-- Pending Signups List -->
        <div id="pendingList" class="pending-list" style="display: none;">
            <!-- Will be populated by JavaScript -->
        </div>
    </div>

    <script src="role-page.js"></script>
    <script src="admin-approvals.js"></script>
</body>

</html>
