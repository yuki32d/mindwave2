<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics — MindWave MOOC</title>
  <style>
    body { font-family: 'Inter', sans-serif; background: #0c0d14; color: #e2e8f0; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .msg { text-align: center; }
    .spinner { width: 36px; height: 36px; border: 3px solid rgba(99,102,241,0.2); border-top-color: #6366f1; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #7c849e; font-size: 14px; }
  </style>
</head>
<body>
  <div class="msg">
    <div class="spinner"></div>
    <p>Redirecting to Admin Analytics…</p>
  </div>
  <script>
    // Analytics is now embedded in the admin panel
    window.location.replace('/mooc/admin.html');
  </script>
</body>
</html>
