<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MindWave MOOC — Dashboard</title>
  <meta name="description" content="Your personalized MOOC learning dashboard — track progress, manage courses, and explore new learning.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Inter', sans-serif; background: #0c0d14; color: #e2e8f0; font-size: 14px; overflow: hidden; }

    :root {
      --bg: #0c0d14;
      --surface: #131520;
      --surface-2: #1a1d2e;
      --surface-3: #1f2235;
      --border: rgba(255,255,255,0.07);
      --border-2: rgba(255,255,255,0.13);
      --text: #e2e8f0;
      --muted: #7c849e;
      --accent: #6366f1;
      --accent-2: #818cf8;
      --accent-glow: rgba(99,102,241,0.2);
      --green: #10b981;
      --orange: #f59e0b;
      --pink: #ec4899;
      --red: #f43f5e;
      --teal: #06b6d4;
      --sidebar-w: 250px;
      --topbar-h: 62px;
      --radius: 14px;
      --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
    }

    /* ── SHELL ── */
    .shell { display: flex; height: 100vh; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w); background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; flex-shrink: 0;
      overflow-y: auto; scrollbar-width: none;
    }
    .sidebar::-webkit-scrollbar { display: none; }

    .sidebar-logo {
      display: flex; align-items: center; gap: 10px;
      padding: 20px 18px; border-bottom: 1px solid var(--border);
    }
    .logo-icon {
      width: 34px; height: 34px; border-radius: 9px;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logo-icon i { width: 17px; height: 17px; color: #fff; }
    .logo-text { font-size: 15px; font-weight: 800; letter-spacing: -0.01em; }
    .logo-badge {
      margin-left: auto; font-size: 9px; font-weight: 700;
      background: rgba(99,102,241,0.18); color: var(--accent-2);
      border: 1px solid rgba(99,102,241,0.3); border-radius: 999px;
      padding: 2px 7px; text-transform: uppercase; letter-spacing: 0.06em;
    }

    .nav-section { padding: 14px 10px 6px; }
    .nav-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted);
      padding: 0 8px; margin-bottom: 4px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; border-radius: 9px;
      cursor: pointer; color: var(--muted); font-weight: 500;
      font-size: 13.5px; text-decoration: none;
      transition: background var(--transition), color var(--transition);
      position: relative;
    }
    .nav-item i { width: 16px; height: 16px; flex-shrink: 0; }
    .nav-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .nav-item.active { background: rgba(99,102,241,0.15); color: var(--accent-2); }
    .nav-item.active::before {
      content: ''; position: absolute; left: 0; top: 20%; bottom: 20%;
      width: 3px; border-radius: 0 3px 3px 0; background: var(--accent);
    }
    .nav-badge {
      margin-left: auto; font-size: 10px; font-weight: 700;
      background: var(--accent); color: #fff;
      border-radius: 999px; padding: 1px 7px; min-width: 20px; text-align: center;
    }
    .nav-divider { height: 1px; background: var(--border); margin: 6px 10px; }

    /* Faculty role chip */
    .role-chip {
      display: flex; align-items: center; gap: 6px;
      background: rgba(99,102,241,0.12); border: 1px solid rgba(99,102,241,0.25);
      border-radius: 999px; padding: 4px 10px; margin: 10px 12px;
      font-size: 11px; font-weight: 700; color: var(--accent-2);
    }
    .role-chip i { width: 12px; height: 12px; }
    .role-chip.faculty { background: rgba(16,185,129,0.12); border-color: rgba(16,185,129,0.25); color: var(--green); }

    .sidebar-footer {
      margin-top: auto; padding: 14px 10px;
      border-top: 1px solid var(--border);
    }
    .user-card {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 10px; border-radius: 10px;
      background: var(--surface-2); border: 1px solid var(--border);
      cursor: pointer; transition: background var(--transition);
    }
    .user-card:hover { background: rgba(255,255,255,0.05); }
    .user-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--pink));
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 12px; color: #fff; flex-shrink: 0;
    }
    .user-info { flex: 1; min-width: 0; }
    .user-name { font-weight: 600; font-size: 12.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-role { font-size: 11px; color: var(--muted); }

    /* ── MAIN ── */
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }

    /* ── TOPBAR ── */
    .topbar {
      height: var(--topbar-h); background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 26px; gap: 14px; flex-shrink: 0;
    }
    .topbar-title { font-size: 14px; font-weight: 600; }
    .topbar-search {
      margin-left: auto; display: flex; align-items: center; gap: 8px;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 9px; padding: 7px 14px; width: 210px;
      transition: border-color var(--transition);
    }
    .topbar-search:focus-within { border-color: var(--accent); }
    .topbar-search i { width: 14px; height: 14px; color: var(--muted); flex-shrink: 0; }
    .topbar-search input { background: none; border: none; outline: none; color: var(--text); font-size: 13px; font-family: inherit; width: 100%; }
    .topbar-search input::placeholder { color: var(--muted); }
    .topbar-actions { display: flex; align-items: center; gap: 8px; margin-left: 12px; }
    .icon-btn {
      width: 34px; height: 34px; border-radius: 8px;
      background: var(--surface-2); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background var(--transition); position: relative;
    }
    .icon-btn i { width: 15px; height: 15px; color: var(--muted); }
    .icon-btn:hover { background: rgba(255,255,255,0.07); }
    .notif-dot {
      position: absolute; top: 7px; right: 7px;
      width: 7px; height: 7px; background: var(--red);
      border-radius: 50%; border: 2px solid var(--surface);
    }

    /* ── CONTENT ── */
    .content { flex: 1; overflow-y: auto; padding: 24px 28px; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent; }

    /* ── HERO BANNER ── */
    .hero-banner {
      background: linear-gradient(135deg, #1e1f3a 0%, #2d1f4e 50%, #1a2442 100%);
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: var(--radius); padding: 28px 32px;
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 22px; position: relative; overflow: hidden;
    }
    .hero-banner::before {
      content: ''; position: absolute; right: -60px; top: -60px;
      width: 250px; height: 250px;
      background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, transparent 70%);
    }
    .hero-text h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 4px; }
    .hero-text p { color: #9ca3c8; font-size: 13px; }
    .hero-stats { display: flex; gap: 16px; z-index: 1; }
    .hero-stat {
      background: rgba(255,255,255,0.08); backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.12); border-radius: 12px;
      padding: 14px 20px; text-align: center; min-width: 90px;
    }
    .hero-stat-val { font-size: 24px; font-weight: 800; letter-spacing: -0.02em; }
    .hero-stat-lbl { font-size: 11px; color: #9ca3c8; margin-top: 2px; font-weight: 500; }
    .hero-stat.accent .hero-stat-val { color: var(--accent-2); }
    .hero-stat.green .hero-stat-val { color: var(--green); }
    .hero-stat.orange .hero-stat-val { color: var(--orange); }

    /* ── TABS ── */
    .tabs { display: flex; gap: 4px; margin-bottom: 20px; background: var(--surface-2); border-radius: 10px; padding: 4px; width: fit-content; }
    .tab-btn {
      display: flex; align-items: center; gap: 7px;
      padding: 8px 18px; border-radius: 7px; cursor: pointer;
      color: var(--muted); font-weight: 600; font-size: 13px;
      transition: all var(--transition); border: none; background: none; font-family: inherit;
    }
    .tab-btn i { width: 14px; height: 14px; }
    .tab-btn.active { background: var(--accent); color: #fff; box-shadow: 0 4px 14px rgba(99,102,241,0.35); }
    .tab-btn:not(.active):hover { color: var(--text); background: rgba(255,255,255,0.05); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── KPI GRID ── */
    .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
    .kpi-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px 20px;
      transition: border-color var(--transition), transform var(--transition);
      cursor: default;
    }
    .kpi-card:hover { border-color: var(--border-2); transform: translateY(-2px); }
    .kpi-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .kpi-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; }
    .kpi-icon-wrap {
      width: 32px; height: 32px; border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
    }
    .kpi-icon-wrap i { width: 16px; height: 16px; }
    .kpi-icon-wrap.accent { background: rgba(99,102,241,0.15); color: var(--accent-2); }
    .kpi-icon-wrap.green { background: rgba(16,185,129,0.15); color: var(--green); }
    .kpi-icon-wrap.orange { background: rgba(245,158,11,0.15); color: var(--orange); }
    .kpi-icon-wrap.pink { background: rgba(236,72,153,0.15); color: var(--pink); }
    .kpi-value { font-size: 28px; font-weight: 900; letter-spacing: -0.03em; line-height: 1; margin-bottom: 6px; }
    .kpi-change { font-size: 12px; font-weight: 600; color: var(--green); display: flex; align-items: center; gap: 4px; }
    .kpi-change i { width: 12px; height: 12px; }

    /* Sparkline */
    .sparkline { display: flex; align-items: flex-end; gap: 3px; height: 32px; margin-top: 10px; }
    .spark-bar { flex: 1; border-radius: 3px 3px 0 0; background: rgba(99,102,241,0.25); transition: background var(--transition); }
    .spark-bar.hi { background: var(--accent); }

    /* ── DASH GRID ── */
    .dash-grid { display: grid; grid-template-columns: 1fr 320px; gap: 18px; }
    .dash-col { display: flex; flex-direction: column; gap: 18px; }

    /* ── PANEL ── */
    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; border-bottom: 1px solid var(--border);
    }
    .panel-title { font-size: 13.5px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .panel-title i { width: 16px; height: 16px; color: var(--accent-2); }
    .panel-action { font-size: 12px; font-weight: 700; color: var(--accent-2); cursor: pointer; background: none; border: none; font-family: inherit; text-decoration: none; }
    .panel-action:hover { color: var(--accent); }
    .panel-body { padding: 18px 20px; }

    /* ── COURSE CARD (enrolled) ── */
    .course-card-list { display: flex; flex-direction: column; gap: 12px; }
    .enrolled-card {
      display: flex; align-items: center; gap: 14px;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 16px;
      transition: border-color var(--transition), transform var(--transition);
    }
    .enrolled-card:hover { border-color: var(--border-2); transform: translateX(2px); }
    .course-color-dot {
      width: 44px; height: 44px; border-radius: 11px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 18px;
    }
    .course-info { flex: 1; min-width: 0; }
    .course-code-badge { font-size: 10px; font-weight: 700; color: var(--accent-2); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 2px; }
    .course-name { font-size: 13.5px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 8px; }
    .progress-wrap {}
    .progress-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .progress-label { font-size: 11px; color: var(--muted); font-weight: 500; }
    .progress-pct { font-size: 11px; font-weight: 700; color: var(--accent-2); }
    .progress-bar { height: 5px; background: rgba(99,102,241,0.15); border-radius: 999px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(to right, var(--accent), #a78bfa); border-radius: 999px; transition: width 0.5s ease; }
    .continue-btn {
      padding: 8px 16px; border-radius: 8px;
      background: rgba(99,102,241,0.15); color: var(--accent-2);
      border: 1px solid rgba(99,102,241,0.25); font-size: 12px; font-weight: 700;
      cursor: pointer; white-space: nowrap; font-family: inherit;
      transition: all var(--transition);
    }
    .continue-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ── INSTRUCTOR COURSE CARDS ── */
    .instructor-course-card {
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px; margin-bottom: 12px;
      transition: border-color var(--transition);
    }
    .instructor-course-card:hover { border-color: rgba(99,102,241,0.3); }
    .instructor-card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
    .instructor-course-code { font-size: 10px; font-weight: 700; color: var(--teal); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 3px; }
    .instructor-course-name { font-size: 14px; font-weight: 700; }
    .instructor-stats-row { display: flex; gap: 12px; }
    .i-stat {
      flex: 1; background: var(--surface-3); border-radius: 9px; padding: 10px 12px; text-align: center;
    }
    .i-stat-val { font-size: 18px; font-weight: 800; }
    .i-stat-lbl { font-size: 10px; color: var(--muted); margin-top: 1px; font-weight: 500; }
    .i-stat.students .i-stat-val { color: var(--accent-2); }
    .i-stat.progress .i-stat-val { color: var(--green); }
    .i-stat.done .i-stat-val { color: var(--orange); }
    .manage-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 8px; margin-top: 12px;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      color: #fff; font-size: 12px; font-weight: 700; border: none;
      cursor: pointer; font-family: inherit; transition: opacity var(--transition);
      text-decoration: none;
    }
    .manage-btn i { width: 13px; height: 13px; }
    .manage-btn:hover { opacity: 0.85; }

    /* ── UPCOMING / RIGHT PANEL ── */
    .upcoming-list { display: flex; flex-direction: column; gap: 10px; }
    .upcoming-item {
      display: flex; gap: 12px; align-items: flex-start;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 14px;
    }
    .upcoming-date-box {
      text-align: center; min-width: 38px;
      background: rgba(99,102,241,0.12); border-radius: 8px; padding: 6px 4px;
    }
    .upcoming-day { font-size: 18px; font-weight: 800; letter-spacing: -0.02em; color: var(--accent-2); line-height: 1; }
    .upcoming-mon { font-size: 9px; font-weight: 700; text-transform: uppercase; color: var(--muted); }
    .upcoming-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
    .upcoming-meta { display: flex; align-items: center; gap: 6px; }
    .upcoming-time { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 3px; }
    .upcoming-time i { width: 11px; height: 11px; }
    .chip {
      font-size: 10px; font-weight: 700; border-radius: 999px; padding: 2px 8px; letter-spacing: 0.03em;
    }
    .chip-live { background: rgba(99,102,241,0.15); color: var(--accent-2); }
    .chip-quiz { background: rgba(244,63,94,0.15); color: var(--red); }
    .chip-assign { background: rgba(245,158,11,0.15); color: var(--orange); }

    /* ── LEADERBOARD ── */
    .lb-list { display: flex; flex-direction: column; gap: 8px; }
    .lb-item {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface-2); border-radius: 9px; padding: 9px 12px;
      transition: background var(--transition);
    }
    .lb-item:hover { background: var(--surface-3); }
    .lb-rank { font-size: 13px; font-weight: 800; width: 20px; text-align: center; color: var(--muted); }
    .lb-rank.gold { color: #f59e0b; }
    .lb-rank.silver { color: #94a3b8; }
    .lb-rank.bronze { color: #b45309; }
    .lb-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 800; color: #fff; flex-shrink: 0;
    }
    .lb-name { flex: 1; font-size: 13px; font-weight: 600; }
    .lb-score { font-size: 12px; font-weight: 700; color: var(--accent-2); }

    /* ── EMPTY STATE ── */
    .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
    .empty-state i { width: 36px; height: 36px; margin-bottom: 12px; opacity: 0.4; }
    .empty-state h3 { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .empty-state p { font-size: 13px; margin-bottom: 16px; }
    .btn-primary {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 10px 20px; border-radius: 9px; background: var(--accent);
      color: #fff; font-size: 13px; font-weight: 700; border: none;
      cursor: pointer; font-family: inherit; text-decoration: none;
      transition: all var(--transition);
    }
    .btn-primary:hover { background: #5254cc; box-shadow: 0 0 0 3px rgba(99,102,241,0.25); }
    .btn-primary i { width: 14px; height: 14px; }

    /* Loading spinner */
    .loader {
      display: flex; justify-content: center; padding: 30px;
    }
    .spinner {
      width: 28px; height: 28px; border: 3px solid rgba(99,102,241,0.2);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Quick enroll recommended card */
    .rec-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .rec-card {
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px;
      transition: border-color var(--transition), transform var(--transition);
    }
    .rec-card:hover { border-color: rgba(99,102,241,0.3); transform: translateY(-2px); }
    .rec-code { font-size: 10px; font-weight: 700; color: var(--pink); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 4px; }
    .rec-name { font-size: 13px; font-weight: 700; margin-bottom: 8px; line-height: 1.3; }
    .rec-duration { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 4px; margin-bottom: 10px; }
    .rec-duration i { width: 11px; height: 11px; }
    .enroll-btn {
      width: 100%; padding: 8px; border-radius: 8px;
      background: rgba(99,102,241,0.12); color: var(--accent-2);
      border: 1px solid rgba(99,102,241,0.2); font-size: 12px; font-weight: 700;
      cursor: pointer; font-family: inherit; transition: all var(--transition);
    }
    .enroll-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  </style>
</head>
<body>
<div class="shell">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon"><i data-lucide="brain-circuit"></i></div>
      <span class="logo-text">MindWave</span>
      <span class="logo-badge">MOOC</span>
    </div>

    <!-- Role chip shown after auth -->
    <div id="roleChip" class="role-chip" style="display:none;">
      <i data-lucide="user-check"></i>
      <span id="roleChipText">Student</span>
    </div>

    <nav class="nav-section">
      <div class="nav-label">Main</div>
      <a href="/mooc/dashboard.html" class="nav-item active">
        <i data-lucide="layout-dashboard"></i> Dashboard
      </a>
      <a href="/mooc/courses.html" class="nav-item">
        <i data-lucide="book-open"></i> Browse Courses
      </a>
      <a href="#" class="nav-item" id="instructorNav" style="display:none;">
        <i data-lucide="graduation-cap"></i> My Courses
        <span class="nav-badge" id="instructorCoursesCount">0</span>
      </a>
    </nav>

    <div class="nav-divider"></div>

    <nav class="nav-section" id="learningNav">
      <div class="nav-label">Learning</div>
      <a href="#" class="nav-item" onclick="goToContinue()">
        <i data-lucide="play-circle"></i> Continue Learning
      </a>

<script>
// ═══════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════
function logout() {
  document.cookie = 'mindwave_mooc_token=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
  localStorage.removeItem('mooc_role');
  localStorage.removeItem('mooc_name');
  window.location.href = '/mooc/login.html';
}

function goToContinue() {
  document.querySelector('#tab-student')?.click();
}

function getInitials(name) {
  if (!name) return '??';
  const parts = name.trim().split(' ');
  return parts.length > 1 ? (parts[0][0] + parts[parts.length-1][0]).toUpperCase() : name.substring(0,2).toUpperCase();
}

const COLORS = ['#6366f1','#ec4899','#10b981','#f59e0b','#06b6d4','#8b5cf6','#f43f5e'];
const EMOJIS = ['📘','🧪','🌐','💻','🔬','📊','🎯','⚙️','🌍','🧮'];
function getColor(i) { return COLORS[i % COLORS.length]; }
function getEmoji(i) { return EMOJIS[i % EMOJIS.length]; }

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
async function init() {
  try {
    const meRes = await fetch('/api/mooc/user/me');
    if (!meRes.ok) { window.location.href = '/mooc/login.html'; return; }
    const { user } = await meRes.json();

    // Redirect admins
    if (user.role === 'super_admin') { window.location.href = '/mooc/admin.html'; return; }

    // Update sidebar
    document.getElementById('sidebarName').textContent = user.name;
    document.getElementById('sidebarRole').textContent = user.role === 'faculty' ? 'Faculty · MOOC' : 'Student · MOOC';
    document.getElementById('sidebarAvatar').textContent = getInitials(user.name);

    const chip = document.getElementById('roleChip');
    chip.style.display = 'flex';
    if (user.role === 'faculty') {
      chip.classList.add('faculty');
      document.getElementById('roleChipText').textContent = 'Faculty Member';
    } else {
      document.getElementById('roleChipText').textContent = 'Student';
    }

    // Render content
    if (user.role === 'faculty') {
      await renderFacultyDashboard(user);
    } else {
      await renderStudentDashboard(user);
    }
  } catch (err) {
    console.error(err);
    document.getElementById('mainContent').innerHTML = '<div class="empty-state"><p>Failed to load dashboard. Please try again.</p></div>';
  }
}

// ═══════════════════════════════════════════
// STUDENT DASHBOARD
// ═══════════════════════════════════════════
async function renderStudentDashboard(user) {
  document.getElementById('topbarTitle').textContent = 'Student Dashboard';

  const [dashRes, coursesRes] = await Promise.all([
    fetch('/api/mooc/dashboard'),
    fetch('/api/mooc/courses')
  ]);
  const dashData = await dashRes.json();
  const coursesData = await coursesRes.json();

  const enrollments = dashData.enrollments || [];
  const totalCourses = enrollments.length;
  const avgProgress = totalCourses > 0 
    ? Math.round(enrollments.reduce((s,e) => s + (e.progressPercentage||0), 0) / totalCourses)
    : 0;
  const completedCount = enrollments.filter(e => (e.progressPercentage||0) >= 100).length;

  // Recommended: courses not yet enrolled
  const enrolledIds = new Set(enrollments.map(e => e.courseId?._id));
  const recommended = (coursesData.courses || []).filter(c => !enrolledIds.has(c._id)).slice(0, 3);

  const greeting = getGreeting();

  document.getElementById('mainContent').innerHTML = `
    <!-- HERO -->
    <div class="hero-banner">
      <div class="hero-text">
        <h1>${greeting}, ${user.name.split(' ')[0]} 👋</h1>
        <p>Pick up right where you left off. You're doing great!</p>
      </div>
      <div class="hero-stats">
        <div class="hero-stat accent">
          <div class="hero-stat-val">${totalCourses}</div>
          <div class="hero-stat-lbl">Enrolled</div>
        </div>
        <div class="hero-stat green">
          <div class="hero-stat-val">${avgProgress}%</div>
          <div class="hero-stat-lbl">Avg Progress</div>
        </div>
        <div class="hero-stat orange">
          <div class="hero-stat-val">${completedCount}</div>
          <div class="hero-stat-lbl">Completed</div>
        </div>
      </div>
    </div>

    <!-- MAIN GRID -->
    <div class="dash-grid">
      <div class="dash-col">
        <!-- ENROLLED COURSES -->
        <div class="panel">
          <div class="panel-header">
            <div class="panel-title"><i data-lucide="play-circle"></i> Continue Learning</div>
            <a href="/mooc/courses.html" class="panel-action">Browse all →</a>
          </div>
          <div class="panel-body">
            ${enrollments.length === 0 
              ? `<div class="empty-state">
                  <i data-lucide="book-open"></i>
                  <h3>No courses yet</h3>
                  <p>Start your learning journey by enrolling in a course.</p>
                  <a href="/mooc/courses.html" class="btn-primary"><i data-lucide="compass"></i> Browse Courses</a>
                </div>`
              : `<div class="course-card-list">${enrollments.map((e, idx) => {
                  const c = e.courseId || {};
                  const pct = Math.round(e.progressPercentage || 0);
                  return `
                  <div class="enrolled-card">
                    <div class="course-color-dot" style="background: ${getColor(idx)}22;">
                      <span>${getEmoji(idx)}</span>
                    </div>
                    <div class="course-info">
                      <div class="course-code-badge">${c.courseCode || 'MOOC'}</div>
                      <div class="course-name">${c.title || 'Untitled Course'}</div>
                      <div class="progress-wrap">
                        <div class="progress-row">
                          <span class="progress-label">Progress</span>
                          <span class="progress-pct">${pct}%</span>
                        </div>
                        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
                      </div>
                    </div>
                    <button class="continue-btn" onclick="continueLearning('${c._id}')">
                      ${pct === 0 ? 'Start' : 'Continue'}
                    </button>
                  </div>`;
                }).join('')}</div>`
            }
          </div>
        </div>

        <!-- RECOMMENDED -->
        ${recommended.length > 0 ? `
        <div class="panel">
          <div class="panel-header">
            <div class="panel-title"><i data-lucide="sparkles"></i> Recommended Courses</div>
            <a href="/mooc/courses.html" class="panel-action">See all →</a>
          </div>
          <div class="panel-body">
            <div class="rec-grid">
              ${recommended.map((c, idx) => `
                <div class="rec-card">
                  <div class="rec-code">${c.courseCode}</div>
                  <div class="rec-name">${c.title}</div>
                  <div class="rec-duration"><i data-lucide="clock"></i> ${c.duration || 'Self-paced'}</div>
                  ${c.instructorName ? `<div style="font-size:11px;color:var(--muted);margin-bottom:8px;">👨‍🏫 ${c.instructorName}</div>` : ''}
                  <button class="enroll-btn" onclick="enroll('${c._id}')">Enroll Now</button>
                </div>
              `).join('')}
            </div>
          </div>
        </div>` : ''}
      </div>

      <!-- RIGHT COLUMN -->
      <div class="dash-col">
        <!-- XP RING -->
        <div class="panel">
          <div class="panel-header">
            <div class="panel-title"><i data-lucide="zap"></i> Your Progress</div>
          </div>
          <div class="panel-body" style="text-align:center;">
            <svg width="110" height="110" viewBox="0 0 110 110">
              <circle cx="55" cy="55" r="46" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="10"/>
              <circle cx="55" cy="55" r="46" fill="none" stroke="url(#pg)" stroke-width="10"
                stroke-linecap="round" stroke-dasharray="${Math.round(2*Math.PI*46)}"
                stroke-dashoffset="${Math.round(2*Math.PI*46 * (1 - avgProgress/100))}"
                transform="rotate(-90 55 55)"/>
              <defs>
                <linearGradient id="pg" x1="0" y1="0" x2="1" y2="0">
                  <stop offset="0%" stop-color="#6366f1"/>
                  <stop offset="100%" stop-color="#a78bfa"/>
                </linearGradient>
              </defs>
              <text x="55" y="49" text-anchor="middle" font-size="22" font-weight="900" fill="#e2e8f0">${avgProgress}%</text>
              <text x="55" y="65" text-anchor="middle" font-size="11" fill="#7c849e">avg progress</text>
            </svg>
            <div style="display:flex;gap:10px;margin-top:14px;">
              <div style="flex:1;background:var(--surface-2);border-radius:9px;padding:10px;text-align:center;">
                <div style="font-size:18px;font-weight:800;color:var(--accent-2);">${totalCourses}</div>
                <div style="font-size:10px;color:var(--muted);font-weight:600;">Courses</div>
              </div>
              <div style="flex:1;background:var(--surface-2);border-radius:9px;padding:10px;text-align:center;">
                <div style="font-size:18px;font-weight:800;color:var(--green);">${completedCount}</div>
                <div style="font-size:10px;color:var(--muted);font-weight:600;">Completed</div>
              </div>
            </div>
          </div>
        </div>

        <!-- UPCOMING -->
        <div class="panel" style="flex:1;">
          <div class="panel-header">
            <div class="panel-title"><i data-lucide="calendar"></i> Upcoming</div>
          </div>
          <div class="panel-body">
            <div class="upcoming-list">
              <div class="upcoming-item">
                <div class="upcoming-date-box"><div class="upcoming-day">18</div><div class="upcoming-mon">Apr</div></div>
                <div>
                  <div class="upcoming-title">Live Q&A Session</div>
                  <div class="upcoming-meta">
                    <div class="upcoming-time"><i data-lucide="clock"></i> 11:00 AM</div>
                    <span class="chip chip-live">Live</span>
                  </div>
                </div>
              </div>
              <div class="upcoming-item">
                <div class="upcoming-date-box" style="background:rgba(244,63,94,0.12);">
                  <div class="upcoming-day" style="color:var(--red);">21</div>
                  <div class="upcoming-mon">Apr</div>
                </div>
                <div>
                  <div class="upcoming-title">Module Quiz Due</div>
                  <div class="upcoming-meta">
                    <div class="upcoming-time"><i data-lucide="clock"></i> 11:59 PM</div>
                    <span class="chip chip-quiz">Quiz</span>
                  </div>
                </div>
              </div>
              <div class="upcoming-item">
                <div class="upcoming-date-box" style="background:rgba(245,158,11,0.12);">
                  <div class="upcoming-day" style="color:var(--orange);">25</div>
                  <div class="upcoming-mon">Apr</div>
                </div>
                <div>
                  <div class="upcoming-title">Final Assignment</div>
                  <div class="upcoming-meta">
                    <div class="upcoming-time"><i data-lucide="clock"></i> 11:59 PM</div>
                    <span class="chip chip-assign">Assignment</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;

  lucide.createIcons();
}

// ═══════════════════════════════════════════

async function renderFacultyDashboard(user) {
  document.getElementById('topbarTitle').textContent = 'Faculty Dashboard';

  const [dashRes, instructorRes] = await Promise.all([
    fetch('/api/mooc/dashboard'),
    fetch('/api/mooc/instructor/courses')
  ]);
  const dashData = await dashRes.json();
  const instructorData = await instructorRes.json();

  const enrollments = dashData.enrollments || [];
  const instructorCourses = instructorData.courses || [];

  document.getElementById('instructorCoursesCount').textContent = instructorCourses.length;

  // Faculty KPIs (as instructor)
  const totalStudents = instructorCourses.reduce((s, c) => s + (c.totalStudents||0), 0);
  const avgCompletion = instructorCourses.length > 0
    ? Math.round(instructorCourses.reduce((s, c) => s + (c.avgProgress||0), 0) / instructorCourses.length)
    : 0;
  const totalCompleted = instructorCourses.reduce((s, c) => s + (c.completed||0), 0);

  // Personal enrollments
  const myEnrolled = enrollments.length;
  const myAvgProgress = myEnrolled > 0

      </div>
      <div class="hero-stats">
        <div class="hero-stat accent">
          <div class="hero-stat-val">${instructorCourses.length}</div>
          <div class="hero-stat-lbl">Courses Teaching</div>
        </div>
        <div class="hero-stat green">
          <div class="hero-stat-val">${totalStudents}</div>
          <div class="hero-stat-lbl">Total Students</div>
        </div>

          <div class="hero-stat-lbl">Avg Completion</div>

            ${[40,55,50,70,65,80,100].map((h,i,a)=>`<div class="spark-bar ${i===a.length-1?'hi':''}" style="height:${h}%"></div>`).join('')}

            <span style="color:var(--green);">ℹ️</span>
            <span>As a course learner, you are counted as a <strong>student</strong> — separate from your faculty instructor role.</span>
          </div>
          <div class="panel">
            <div class="panel-header">
              <div class="panel-title"><i data-lucide="play-circle"></i> My Enrolled Courses</div>

            <div class="panel-body">
              <div class="course-card-list">
                ${enrollments.map((e, idx) => {
                  const c = e.courseId || {};
                  const pct = Math.round(e.progressPercentage || 0);
                  return `
                  <div class="enrolled-card">
                    <div class="course-color-dot" style="background: ${getColor(idx)}22;"><span>${getEmoji(idx)}</span></div>
                    <div class="course-info">
                      <div class="course-code-badge">${c.courseCode || 'MOOC'}</div>
                      <div class="course-name">${c.title || 'Untitled Course'}</div>
                      <div class="progress-wrap">
                        <div class="progress-row">
                          <span class="progress-label">Progress</span>
                          <span class="progress-pct">${pct}%</span>
                        </div>
                        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
                      </div>
                    </div>
                    <button class="continue-btn" onclick="continueLearning('${c._id}')">
                      ${pct === 0 ? 'Start' : 'Continue'}

  lucide.createIcons();

// ═══════════════════════════════════════════
// TAB SWITCHER

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
}

// ═══════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════
async function enroll(courseId) {
  try {
    const res = await fetch(`/api/mooc/enroll/${courseId}`, { method: 'POST' });
    const data = await res.json();
    if (data.ok) {
      window.location.reload();
    } else {
      alert(data.message || 'Could not enroll.');
    }
  } catch (e) { alert('Network error.'); }
}

function continueLearning(courseId) {
  alert(`Opening course player for: ${courseId}\n(Course player page coming soon!)`);
}

function getGreeting() {
  const h = new Date().getHours();
  return h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
}
