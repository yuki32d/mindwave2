<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mindwave MOOC - Courses</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --text-dark: #111827;
            --text-muted: #6b7280;
            --bg-color: #f3f4f6;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.4);
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            color: var(--text-dark);
            min-height: 100vh;
        }

        .navbar {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .navbar-brand {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(to right, #4f46e5, #ec4899);
            -webkit-background-clip: text;
            color: transparent;
            text-decoration: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 600;
            margin-left: 24px;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        #user-info {
            font-weight: 600;
            font-size: 14px;
            display: none;
            align-items: center;
            gap: 16px;
        }

        .btn-logout {
            cursor: pointer;
            color: #ef4444;
            font-weight: 600;
        }

        .hero {
            padding: 80px 40px;
            text-align: center;
            background: linear-gradient(135deg, #e0e7ff 0%, #ede9fe 100%);
        }

        .hero h1 {
            font-size: 48px;
            font-weight: 800;
            margin: 0 0 16px 0;
            letter-spacing: -1px;
        }

        .hero p {
            font-size: 18px;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto;
        }

        .dashboard-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 24px;
        }

        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .course-card {
            background: #fff;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .course-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow);
        }

        .course-code {
            font-size: 12px;
            font-weight: 700;
            color: #ec4899;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .course-title {
            font-size: 20px;
            font-weight: 700;
            margin: 0 0 12px 0;
            line-height: 1.3;
        }

        .course-desc {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 24px;
            flex: 1;
        }

        .course-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            border-top: 1px solid #f3f4f6;
            padding-top: 16px;
        }

        .duration {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-enroll {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-enroll:hover {
            background: var(--primary-hover);
        }

        .loading-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-weight: 500;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="/mooc/courses.html" class="navbar-brand">Mindwave MOOC</a>
        <div class="nav-links">
            <a href="/mooc/courses.html">Browse Courses</a>
            <span id="user-info">
                <a href="/mooc/dashboard.html" id="dashboard-link">My Dashboard</a>
                <span id="username-display"></span>
                <span class="btn-logout" onclick="logout()">Logout</span>
            </span>
            <a href="/mooc/login.html" id="login-link">Sign In</a>
        </div>
    </nav>

    <div class="hero">
        <h1>Discover New Frontiers</h1>
        <p>Explore our Massively Open Online Courses and advance your technical career with premium guided modules.</p>
    </div>

    <div class="dashboard-container">
        <div id="loading" class="loading-state">Loading courses...</div>
        <div class="courses-grid" id="courses-grid">
            <!-- Populated via JS -->
        </div>
    </div>

    <script>
        let isAuthenticated = false;

        async function checkAuth() {
            try {
                const res = await fetch('/api/mooc/user/me');
                if (res.ok) {
                    const data = await res.json();
                    isAuthenticated = true;
                    document.getElementById('user-info').style.display = 'flex';
                    document.getElementById('login-link').style.display = 'none';
                    document.getElementById('username-display').textContent = data.user.name;
                }
            } catch (err) {
                console.error("Not authenticated");
            }
        }

        async function loadCourses() {
            try {
                const res = await fetch('/api/mooc/courses');
                const data = await res.json();

                const grid = document.getElementById('courses-grid');
                grid.innerHTML = '';
                document.getElementById('loading').style.display = 'none';

                if (data.courses.length === 0) {
                    grid.innerHTML = '<p style="color:var(--text-muted); text-align:center; grid-column: 1/-1;">No courses published yet.</p>';
                    return;
                }

                data.courses.forEach(course => {
                    const template = `
                        <div class="course-card">
                            <div class="course-code">${course.courseCode}</div>
                            <h3 class="course-title">${course.title}</h3>
                            <p class="course-desc">${course.description || 'No description available.'}</p>
                            <div class="course-meta">
                                <div class="duration">
                                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                    ${course.duration || 'Self-paced'}
                                </div>
                                <button class="btn-enroll" onclick="enroll('${course._id}')">Enroll</button>
                            </div>
                        </div>
                    `;
                    grid.insertAdjacentHTML('beforeend', template);
                });

            } catch (error) {
                console.error('Error loading courses:', error);
                document.getElementById('loading').textContent = 'Failed to load courses.';
            }
        }

        async function enroll(courseId) {
            if (!isAuthenticated) {
                // Save intention
                sessionStorage.setItem('mooc_pending_enrollment', courseId);
                window.location.href = '/mooc/login.html';
                return;
            }

            try {
                const res = await fetch(`/api/mooc/enroll/${courseId}`, { method: 'POST' });
                const data = await res.json();
                
                if (data.ok) {
                    window.location.href = '/mooc/dashboard.html';
                } else {
                    alert(data.message || 'Failed to enroll');
                }
            } catch (error) {
                alert('Network error while enrolling');
            }
        }

        function logout() {
            document.cookie = 'mindwave_mooc_token=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
            window.location.reload();
        }

        window.onload = async () => {
            await checkAuth();
            await loadCourses();

            // Check if we came back from login with an enrollment intent
            const pendingCourse = sessionStorage.getItem('mooc_pending_enrollment');
            if (pendingCourse && isAuthenticated) {
                sessionStorage.removeItem('mooc_pending_enrollment');
                enroll(pendingCourse);
            }
        };
    </script>
</body>
</html>
