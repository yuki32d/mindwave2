<!DOCTYPE html>
<html lang="en">

<head>
    <script src="admin-theme-init.js"></script>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="loading-spinner.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peer Review Admin | MindWave</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="auth-guard.js"></script>
    <script>
        (function () {
            var t = localStorage.getItem('token');
            if (!t) { window.location.replace('login.html'); return; }
            try {
                var p = JSON.parse(atob(t.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
                if (p.exp && Date.now() / 1000 > p.exp) { localStorage.removeItem('token'); window.location.replace('login.html'); return; }
                if (p.role !== 'admin' && p.role !== 'faculty') { window.location.replace('homepage.html'); return; }
                window.MW_USER_ROLE = p.role; window.MW_USER_ID = p.sub;
            } catch (e) { localStorage.removeItem('token'); window.location.replace('login.html'); }
        })();
    </script>
    <style>
        :root {
            --bg: #f4f6fb;
            --surface: #ffffff;
            --border: #e5e9f2;
            --accent: #d08000;
            --accent-lo: rgba(208, 128, 0, 0.10);
            --accent-bdr: rgba(208, 128, 0, 0.25);
            --text: #111827;
            --muted: #6b7280;
            --green: #16a34a;
            --red: #dc2626;
            --blue: #2563eb;
            --shadow: 0 1px 4px rgba(0, 0, 0, 0.07), 0 4px 16px rgba(0, 0, 0, 0.05);
            --radius: 14px;
            --mono: 'JetBrains Mono', monospace;
            --sidebar-w: 240px;
            --topbar-h: 58px;
            --s-bg: #0f1c2e;
            --s-border: rgba(255, 255, 255, 0.08);
            --s-text: #cbd5e1;
            --s-muted: #4a5e7a;
            --s-hover: rgba(255, 255, 255, 0.06);
            --s-active-bg: rgba(245, 166, 35, 0.18);
            --s-active-txt: #f5a623;
        }

        [data-theme="dark"] {
            --bg: #0d1117;
            --surface: #161b27;
            --border: rgba(255, 255, 255, 0.08);
            --text: #e2e8f0;
            --muted: #6b7694;
            --shadow: 0 1px 4px rgba(0, 0, 0, 0.4), 0 4px 16px rgba(0, 0, 0, 0.3);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; }
        body { font-family: 'Inter', sans-serif; font-size: 14px; background: var(--bg); color: var(--text); }
        
        .shell { display: grid; grid-template-columns: var(--sidebar-w) 1fr; grid-template-rows: var(--topbar-h) 1fr; height: 100vh; }
        
        /* Sidebar */
        .sidebar { grid-row: 1 / 3; background: var(--s-bg); border-right: 1px solid var(--s-border); display: flex; flex-direction: column; }
        .side-logo { height: var(--topbar-h); display: flex; align-items: center; gap: 10px; padding: 0 20px; border-bottom: 1px solid var(--s-border); flex-shrink: 0; }
        .side-logo-mark { width: 30px; height: 30px; border-radius: 8px; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; }
        .side-logo-name { font-weight: 800; font-size: 15px; color: #fff; }
        .side-scroll { flex: 1; overflow-y: auto; padding: 14px 10px; scrollbar-width: none; }
        .nav-label { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--s-muted); padding: 8px 10px 5px; }
        .nav-item { display: flex; align-items: center; gap: 9px; padding: 9px 10px; border-radius: 9px; font-size: 13px; color: var(--s-text); transition: all .15s; text-decoration: none; }
        .nav-item:hover { background: var(--s-hover); color: #fff; }
        .nav-item.active { background: var(--s-active-bg); color: var(--s-active-txt); font-weight: 700; }
        .side-divider { height: 1px; background: var(--s-border); margin: 8px 10px; }
        .side-foot { border-top: 1px solid var(--s-border); padding: 12px; }
        .user-card { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: 10px; }
        .user-av { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; }

        /* Main Content */
        .main { display: flex; flex-direction: column; overflow: hidden; }
        .topbar { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 22px; height: var(--topbar-h); }
        .breadcrumb { font-size: 12px; color: var(--muted); }
        .breadcrumb span { color: var(--text); font-weight: 700; }
        .content { flex: 1; overflow-y: auto; padding: 22px; }

        /* Stats Strip */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 18px; margin-bottom: 24px; }
        .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); }
        .stat-label { font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .stat-val { font-size: 28px; font-weight: 800; font-family: var(--mono); }

        /* Tabs */
        .tab-row { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab-btn { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 700; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; transition: all .2s; }
        .tab-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        /* Review Grid/List */
        .review-list { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .review-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; display: flex; align-items: center; justify-content: space-between; transition: all 0.2s; box-shadow: var(--shadow); }
        .review-card:hover { border-color: var(--accent); transform: translateY(-2px); }
        .review-info { display: flex; align-items: center; gap: 16px; }
        .review-icon { width: 44px; height: 44px; border-radius: 12px; background: var(--accent-lo); display: flex; align-items: center; justify-content: center; color: var(--accent); }
        .review-details h3 { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
        .review-details p { font-size: 12px; color: var(--muted); }
        .review-participants { display: flex; gap: 24px; margin-top: 8px; font-size: 11px; color: var(--muted); }
        .participant b { color: var(--text); }
        .status-pill { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .status-pending { background: rgba(208, 128, 0, 0.1); color: var(--accent); }
        .status-submitted { background: rgba(22, 163, 74, 0.1); color: var(--green); }

        /* Empty State */
        .empty-state { text-align: center; padding: 60px; background: var(--surface); border: 2px dashed var(--border); border-radius: 20px; color: var(--muted); }
        
        /* Theme Toggle */
        .theme-toggle { margin-left: auto; width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; justify-content: center; color: var(--muted); cursor: pointer; }
        .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }
    </style>
</head>

<body>
    <div class="shell">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="side-logo">
                <div class="side-logo-mark"><i data-lucide="shield-check"></i></div>
                <span class="side-logo-name">MindWave</span>
            </div>
            <div class="side-scroll">
                <div class="nav-section">
                    <div class="nav-label">Control Center</div>
                    <a href="admin.html" class="nav-item"><i data-lucide="gauge"></i> Overview</a>
                    <a href="admin-students.html" class="nav-item"><i data-lucide="users"></i> Students</a>
                    <a href="faculty-dataanalytics.html" class="nav-item"><i data-lucide="bar-chart-2"></i> Analytics</a>
                </div>
                <div class="side-divider"></div>
                <div class="nav-section">
                    <div class="nav-label">Peer Review</div>
                    <a href="admin-peer-review.html" class="nav-item active"><i data-lucide="users-2"></i> Monitor Reviews</a>
                </div>
                <!-- ... other items removed for brevity ... -->
            </div>
            <div class="side-foot">
                <div class="user-card">
                    <div class="user-av" id="adminAv">AD</div>
                    <div>
                        <div class="user-name" id="adminName">Faculty Admin</div>
                        <div class="user-role">Administrator</div>
                    </div>
                </div>
            </div>
        </aside>

        <div class="main">
            <header class="topbar">
                <div class="breadcrumb">Admin / <span>Peer Review Monitor</span></div>
                <button class="theme-toggle" id="themeToggle">
                    <i data-lucide="sun" id="sunIcon"></i>
                    <i data-lucide="moon" id="moonIcon" style="display:none;"></i>
                </button>
            </header>

            <div class="content">
                <div style="margin-bottom: 24px;">
                    <h1 style="font-size: 24px; font-weight: 800; letter-spacing: -0.02em;">Peer Review Monitoring</h1>
                    <p style="color: var(--muted); margin-top: 4px;">Track ecosystem health and student assessment progress.</p>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label"><i data-lucide="layers"></i> Total Reviews</div>
                        <div class="stat-val" id="statTotal">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label"><i data-lucide="clock"></i> Pending</div>
                        <div class="stat-val" id="statPending" style="color: var(--accent);">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label"><i data-lucide="check-circle-2"></i> Completed</div>
                        <div class="stat-val" id="statCompleted" style="color: var(--green);">0</div>
                    </div>
                </div>

                <div class="tab-row">
                    <button class="tab-btn active" id="tabAll">All Reviews</button>
                    <button class="tab-btn" id="tabPending">Pending Only</button>
                    <button class="tab-btn" id="tabSubmitted">Submitted Only</button>
                </div>

                <div id="reviewList" class="review-list">
                    <div class="empty-state">
                        <div class="loading-spinner"></div>
                        <p style="margin-top: 12px;">Loading peer reviews...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="admin-peer-review.js"></script>
    <script>
        lucide.createIcons();
        
        // Theme Toggle
        const themeBtn = document.getElementById('themeToggle');
        const sun = document.getElementById('sunIcon');
        const moon = document.getElementById('moonIcon');
        
        function updateThemeIcons() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            sun.style.display = isDark ? 'none' : 'block';
            moon.style.display = isDark ? 'block' : 'none';
        }
        
        themeBtn.onclick = () => {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('mw_theme', next);
            updateThemeIcons();
        };
        updateThemeIcons();
    </script>
</body>

</html>
