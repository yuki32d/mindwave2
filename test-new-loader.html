<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New MW Loader Test</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="loading-spinner.css">
    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #0b0b0f;
            color: white;
            padding: 60px 40px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .content {
            text-align: center;
            max-width: 600px;
        }

        h1 {
            font-size: 48px;
            background: linear-gradient(135deg, #00d9ff 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        p {
            color: #9ea4b6;
            font-size: 18px;
            margin-bottom: 30px;
        }

        .btn {
            padding: 16px 32px;
            background: linear-gradient(135deg, #00d9ff 0%, #8b5cf6 100%);
            color: white;
            border: none;
            border-radius: 999px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            margin: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(0, 217, 255, 0.4);
        }

        .success {
            margin-top: 30px;
            padding: 20px;
            background: rgba(0, 217, 255, 0.1);
            border: 1px solid rgba(0, 217, 255, 0.3);
            border-radius: 12px;
        }

        .success h3 {
            color: #00d9ff;
            margin-top: 0;
        }
    </style>
</head>

<body data-theme="dark">
    <div class="content">
        <h1>✅ New MW Loader Active!</h1>
        <p>The new Animated MW Logo loader is now installed. Reload to see it in action!</p>

        <button class="btn" onclick="location.reload()">Reload Page</button>
        <button class="btn" onclick="MindWaveLoader.showFor(3000)">Show for 3 Seconds</button>

        <div class="success">
            <h3>What's New:</h3>
            <ul style="text-align: left; color: #9ea4b6;">
                <li>✨ Rotating gradient rings</li>
                <li>🎯 Perfectly centered MW text</li>
                <li>💫 Floating particles animation</li>
                <li>⚡ Progress dots indicator</li>
                <li>🎨 Adaptive dark/light themes</li>
            </ul>
        </div>
    </div>

    <script src="loading-spinner.js"></script>
</body>

</html>
